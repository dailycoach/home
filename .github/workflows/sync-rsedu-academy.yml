name: Sync RS Edu Academy

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches: ["main"]
    paths:
      - "lcms/academy/data/courses.json"
      - "scripts/sync-youtube-playlists.mjs"
      - ".github/workflows/sync-rsedu-academy.yml"

permissions:
  contents: write

concurrency:
  group: "sync-rsedu-academy"
  cancel-in-progress: true

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync YouTube playlists
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/sync-youtube-playlists.mjs

      - name: Commit updated Academy cache
        run: |
          if git diff --quiet -- lcms/academy/data/youtube-cache.json; then
            echo "Academy cache unchanged."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lcms/academy/data/youtube-cache.json
          git commit -m "chore: sync RS Edu Academy YouTube cache [skip ci]"
          git push origin main
