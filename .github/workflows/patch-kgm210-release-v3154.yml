name: Patch KGM210 release wording v3.15.4

on:
  push:
    branches: [main]
    paths:
      - scripts/patch_kgm210_release_v3154.py
      - .github/workflows/patch-kgm210-release-v3154.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-and-verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply v3.15.4 release wording
        run: python scripts/patch_kgm210_release_v3154.py

      - name: Run profile and seven-week engine tests
        run: |
          node tests/kgm210/kgm210-profile-engine-v314.test.js
          node tests/kgm210/kgm210-weekly-journey-engine-v315.test.js

      - name: Validate browser scripts
        run: |
          node --check tests/kgm210/kgm210-profile-engine-v314.js
          node --check tests/kgm210/kgm210-profile-ui-v314.js
          node --check tests/kgm210/kgm210-weekly-journey-engine-v315.js
          node --check tests/kgm210/kgm210-weekly-journey-ui-v315.js
          node --check tests/kgm210/kgm210-weekly-journey-qa-v3151.js

      - name: Verify operating wording
        run: |
          grep -q '<title>KGM210 성장검사 · 유형매핑·7주여정 v3.15.4 운영판</title>' tests/kgm210/index.html
          grep -q "KGM210 성장검사 · 유형매핑·7주여정 v3.15.4" tests/kgm210/kgm210-profile-ui-v314.js
          grep -q '7주 성장여정' tests/kgm210/index.html
          if grep -q '### 7일 성장기록' tests/kgm210/index.html; then
            echo 'Static 7-day growth heading remains.' >&2
            exit 1
          fi
          grep -q '기존 7일 기록' tests/kgm210/kgm210-weekly-journey-ui-v315.js

      - name: Commit patched release files
        run: |
          if git diff --quiet -- tests/kgm210/index.html tests/kgm210/kgm210-profile-ui-v314.js; then
            echo 'KGM210 v3.15.4 release wording is already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/kgm210/index.html tests/kgm210/kgm210-profile-ui-v314.js
          git commit -m 'release: label KGM210 v3.15.4 operating version'
          git push origin HEAD:main
