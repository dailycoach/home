name: Deploy RS Edu achievements menu

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/deploy-rsedu-main-menu.yml"
      - "index.html"
      - "lcms/**"
      - "ops/rsedu-main-menu-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "deploy-rsedu-main-menu"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch permanent main menu entries
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          def ensure_replacement(before: str, after: str, sentinel: str, label: str) -> None:
              global text
              if sentinel in text:
                  return
              if before not in text:
                  raise SystemExit(f'{label} 기준 문자열을 찾지 못했습니다: {before[:100]}')
              text = text.replace(before, after, 1)

          # 기존 DISC 메뉴 자동 복원 규칙과 충돌하지 않도록 같은 필수 항목을 함께 보존한다.
          if 'data-route="disc16"' not in text or 'data-route="disc16Youth"' not in text:
              disc_replacements = [
                  (
                      '''            <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
            <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>''',
                      '''            <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
            <a href="/tests/disc16/" data-route="disc16">DISC16 행동스타일 <small>NEW</small></a>
            <a href="/tests/disc16-youth/" data-route="disc16Youth">DISC16 청소년 관계 <small>NEW</small></a>
            <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>'''
                  ),
                  (
                      '''          <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
          <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>''',
                      '''          <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
          <a href="/tests/disc16/" data-route="disc16">DISC16 행동스타일 검사 <small>NEW</small></a>
          <a href="/tests/disc16-youth/" data-route="disc16Youth">DISC16 청소년 관계행동 <small>NEW</small></a>
          <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>'''
                  ),
                  (
                      '''      kgm210: '/tests/kgm210/',
      learning: '/tests/learning/',''',
                      '''      kgm210: '/tests/kgm210/',
      disc16: '/tests/disc16/',
      disc16Youth: '/tests/disc16-youth/',
      learning: '/tests/learning/','''
                  )
              ]
              for before, after in disc_replacements:
                  if before not in text:
                      raise SystemExit(f'DISC 메뉴 기준 문자열을 찾지 못했습니다: {before[:100]}')
                  text = text.replace(before, after, 1)

          ensure_replacement(
              '''        <a class="nav-link" href="/lcms/" data-route="lcms">LCMS</a>''',
              '''        <div class="nav-group">
          <button class="nav-button" type="button" aria-haspopup="true">RS에듀 <span aria-hidden="true">⌄</span></button>
          <div class="dropdown" role="menu">
            <a href="/lcms/business-achievements.html" data-route="rsAchievements">사업실적 <small>2010–현재</small></a>
            <a href="/lcms/platform.html" data-route="rsPlatform">Career Platform <small>→</small></a>
          </div>
        </div>''',
              'data-route="rsAchievements">사업실적',
              '데스크톱 RS에듀 메뉴'
          )

          ensure_replacement(
              '''            <a href="/lcms/" data-route="lcms">
              <strong>LCMS <span aria-hidden="true">→</span></strong>
              <small>데이터 기반 진로교육 인프라</small>
            </a>''',
              '''            <a href="/lcms/business-achievements.html" data-route="rsAchievements">
              <strong>RS에듀 사업실적 <span aria-hidden="true">→</span></strong>
              <small>2010년부터 이어진 진로교육 수행 기록</small>
            </a>''',
              '<strong>RS에듀 사업실적',
              '메인 바로가기'
          )

          ensure_replacement(
              '''        <article class="category" data-category="program">
          <h3>교육·프로그램</h3>
          <p>LCMS와 데이터 기반 교육 인프라로 이동합니다.</p>
          <a href="/lcms/" data-route="lcms">LCMS 진로교육 인프라 <small>→</small></a>
        </article>''',
              '''        <article class="category" data-category="program">
          <h3>RS에듀컨설팅</h3>
          <p>진로교육 수행실적과 Career Intelligence Platform을 확인합니다.</p>
          <a href="/lcms/business-achievements.html" data-route="rsAchievements">주요 사업실적 <small>2010–현재</small></a>
          <a href="/lcms/platform.html" data-route="rsPlatform">Career Intelligence Platform <small>→</small></a>
        </article>''',
              '<h3>RS에듀컨설팅</h3>',
              '전체 메뉴 RS에듀 카테고리'
          )

          ensure_replacement(
              '''<a href="/lcms/" data-route="lcms">LCMS</a>''',
              '''<a href="/lcms/business-achievements.html" data-route="rsAchievements">RS에듀 사업실적</a>
          <a href="/lcms/platform.html" data-route="rsPlatform">Career Platform</a>''',
              '>RS에듀 사업실적</a>',
              '푸터 RS에듀 메뉴'
          )

          ensure_replacement(
              '''      lcms: '/lcms/',''',
              '''      lcms: '/lcms/',
      rsAchievements: '/lcms/business-achievements.html',
      rsPlatform: '/lcms/platform.html',''',
              "rsAchievements: '/lcms/business-achievements.html'",
              'RS에듀 라우트 맵'
          )

          required = [
              'href="/tests/disc16/" data-route="disc16"',
              'href="/tests/disc16-youth/" data-route="disc16Youth"',
              "disc16: '/tests/disc16/'",
              "disc16Youth: '/tests/disc16-youth/'",
              'data-route="rsAchievements">사업실적',
              '<strong>RS에듀 사업실적',
              '<h3>RS에듀컨설팅</h3>',
              '>RS에듀 사업실적</a>',
              "rsAchievements: '/lcms/business-achievements.html'",
              "rsPlatform: '/lcms/platform.html'",
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('필수 메뉴 누락: ' + ', '.join(missing))

          if text.count('/lcms/business-achievements.html') < 5:
              raise SystemExit('사업실적 링크 노출 수가 기준보다 적습니다.')
          if text.count('/lcms/platform.html') < 4:
              raise SystemExit('Career Platform 링크 노출 수가 기준보다 적습니다.')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit menu patch
        id: commit
        run: |
          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "feat: permanently expose RS Edu achievements menus [skip ci]"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Request GitHub Pages build
        id: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          request_code=$(curl -sS -L -o /tmp/request.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")
          echo "request_code=${request_code}" >> "$GITHUB_OUTPUT"
          test "${request_code}" = "201"

      - name: Wait for Pages and verify live RS Edu menus
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          LIVE_URL: https://daily-coach-ing.com/
          ACHIEVEMENTS_URL: https://daily-coach-ing.com/lcms/business-achievements.html
        run: |
          build_status="unknown"
          for attempt in $(seq 1 48); do
            sleep 5
            curl -sS -L -o /tmp/build.json \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/builds/latest"
            build_status=$(python -c 'import json; print(json.load(open("/tmp/build.json", encoding="utf-8")).get("status", "unknown"))' 2>/dev/null || echo unknown)
            [ "${build_status}" = "built" ] && break
            [ "${build_status}" = "errored" ] && break
          done

          live_status="not_verified"
          live_code=0
          achievements_count=0
          platform_count=0
          adult_count=0
          youth_count=0
          for attempt in $(seq 1 36); do
            sleep 5
            live_code=$(curl -sS -L -o /tmp/live.html -w "%{http_code}" -H "Cache-Control: no-cache" "${LIVE_URL}?v=${SOURCE_SHA}&a=${attempt}")
            achievements_count=$(grep -c '/lcms/business-achievements.html' /tmp/live.html 2>/dev/null || true)
            platform_count=$(grep -c '/lcms/platform.html' /tmp/live.html 2>/dev/null || true)
            adult_count=$(grep -c '/tests/disc16/' /tmp/live.html 2>/dev/null || true)
            youth_count=$(grep -c '/tests/disc16-youth/' /tmp/live.html 2>/dev/null || true)
            if [ "${live_code}" = "200" ] && [ "${achievements_count}" -ge 4 ] && [ "${platform_count}" -ge 3 ] && [ "${adult_count}" -ge 2 ] && [ "${youth_count}" -ge 2 ]; then
              live_status="verified"
              break
            fi
          done

          achievements_status="not_verified"
          achievements_code=$(curl -sS -L -o /tmp/achievements.html -w "%{http_code}" -H "Cache-Control: no-cache" "${ACHIEVEMENTS_URL}?v=${SOURCE_SHA}")
          all_students_count=$(grep -c '모든 초·중·고 학생' /tmp/achievements.html 2>/dev/null || true)
          if [ "${achievements_code}" = "200" ] && [ "${all_students_count}" -ge 2 ]; then
            achievements_status="verified"
          fi

          echo "build_status=${build_status}" >> "$GITHUB_OUTPUT"
          echo "live_status=${live_status}" >> "$GITHUB_OUTPUT"
          echo "achievements_status=${achievements_status}" >> "$GITHUB_OUTPUT"
          echo "live_code=${live_code}" >> "$GITHUB_OUTPUT"
          echo "achievements_code=${achievements_code}" >> "$GITHUB_OUTPUT"
          echo "achievements_count=${achievements_count}" >> "$GITHUB_OUTPUT"
          echo "platform_count=${platform_count}" >> "$GITHUB_OUTPUT"
          echo "all_students_count=${all_students_count}" >> "$GITHUB_OUTPUT"

          test "${build_status}" = "built"
          test "${live_status}" = "verified"
          test "${achievements_status}" = "verified"
