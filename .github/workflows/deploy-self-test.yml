name: Deploy SELF INC. self-understanding test

on:
  push:
    branches: ["main"]
    paths:
      - "tests/self/**"
      - ".github/workflows/deploy-self-test.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "deploy-self-test"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SELF INC. JavaScript
        run: |
          node --check tests/self/assets/self-v9-data.js
          node --check tests/self/assets/self-v9.js
          node --check tests/self/assets/self-v9-hotfix.js
          node --check tests/self/assets/self-v9-coach.js
          node --check tests/self/assets/self-v9-coach-score.js

      - name: Request Pages build and verify live page
        id: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          LIVE_URL: https://daily-coach-ing.com/tests/self/index.html
          COACH_JS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-coach.js
          SCORE_JS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-coach-score.js
        run: |
          set +e

          request_code=$(curl --silent --show-error --location \
            --output /tmp/pages-request.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")

          build_status="not_checked"
          build_code=0
          build_body=""
          for attempt in $(seq 1 48); do
            sleep 5
            build_code=$(curl --silent --show-error --location \
              --output /tmp/pages-latest.json \
              --write-out "%{http_code}" \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/builds/latest")
            build_body=$(cat /tmp/pages-latest.json 2>/dev/null || true)
            if [ "${build_code}" = "200" ]; then
              build_status=$(python -c 'import json; print(json.load(open("/tmp/pages-latest.json", encoding="utf-8")).get("status", "unknown"))' 2>/dev/null || echo unknown)
              if [ "${build_status}" = "built" ] || [ "${build_status}" = "errored" ]; then
                break
              fi
            fi
          done

          live_code=0
          live_title=""
          live_has_button=0
          live_has_coach_script=0
          live_has_score_script=0
          coach_js_code=0
          coach_js_marker=0
          score_js_code=0
          score_js_marker=0
          live_status="not_verified"

          for attempt in $(seq 1 36); do
            sleep 5
            live_code=$(curl --silent --show-error --location \
              --output /tmp/self-live.html \
              --write-out "%{http_code}" \
              --header "Cache-Control: no-cache" \
              "${LIVE_URL}?deploy=${SOURCE_SHA}&attempt=${attempt}")

            live_title=$(python - <<'PY'
          import re
          from pathlib import Path
          text = Path('/tmp/self-live.html').read_text(encoding='utf-8', errors='ignore')
          match = re.search(r'<title[^>]*>(.*?)</title>', text, re.I | re.S)
          print(re.sub(r'\s+', ' ', match.group(1)).strip() if match else '')
          PY
            )

            live_has_button=$(grep -c 'id="coachViewBtn"' /tmp/self-live.html 2>/dev/null || true)
            live_has_coach_script=$(grep -c 'self-v9-coach.js?v=9.3.0' /tmp/self-live.html 2>/dev/null || true)
            live_has_score_script=$(grep -c 'self-v9-coach-score.js?v=9.3.0' /tmp/self-live.html 2>/dev/null || true)

            coach_js_code=$(curl --silent --show-error --location \
              --output /tmp/self-coach.js \
              --write-out "%{http_code}" \
              --header "Cache-Control: no-cache" \
              "${COACH_JS_URL}?deploy=${SOURCE_SHA}&attempt=${attempt}")
            coach_js_marker=$(grep -c 'KINGDOM 7단계 코칭질문' /tmp/self-coach.js 2>/dev/null || true)

            score_js_code=$(curl --silent --show-error --location \
              --output /tmp/self-coach-score.js \
              --write-out "%{http_code}" \
              --header "Cache-Control: no-cache" \
              "${SCORE_JS_URL}?deploy=${SOURCE_SHA}&attempt=${attempt}")
            score_js_marker=$(grep -c '현재 점수 기반 KINGDOM 질문' /tmp/self-coach-score.js 2>/dev/null || true)

            if [ "${live_code}" = "200" ] \
              && [ "${live_title}" = "SELF INC. | 자존감 운영 점검" ] \
              && [ "${live_has_button}" -gt 0 ] \
              && [ "${live_has_coach_script}" -gt 0 ] \
              && [ "${live_has_score_script}" -gt 0 ] \
              && [ "${coach_js_code}" = "200" ] \
              && [ "${coach_js_marker}" -gt 0 ] \
              && [ "${score_js_code}" = "200" ] \
              && [ "${score_js_marker}" -gt 0 ]; then
              live_status="verified"
              break
            fi
          done

          export REQUEST_CODE="${request_code}"
          export REQUEST_BODY="$(cat /tmp/pages-request.json 2>/dev/null || true)"
          export BUILD_CODE="${build_code}"
          export BUILD_STATUS="${build_status}"
          export BUILD_BODY="${build_body}"
          export LIVE_CODE="${live_code}"
          export LIVE_TITLE="${live_title}"
          export LIVE_HAS_BUTTON="${live_has_button}"
          export LIVE_HAS_COACH_SCRIPT="${live_has_coach_script}"
          export LIVE_HAS_SCORE_SCRIPT="${live_has_score_script}"
          export COACH_JS_CODE="${coach_js_code}"
          export COACH_JS_MARKER="${coach_js_marker}"
          export SCORE_JS_CODE="${score_js_code}"
          export SCORE_JS_MARKER="${score_js_marker}"
          export LIVE_STATUS="${live_status}"

          python - <<'PY'
          import datetime, hashlib, json, os
          from pathlib import Path

          def decode(value):
              try:
                  return json.loads(value)
              except Exception:
                  return value

          live_path = Path('/tmp/self-live.html')
          coach_path = Path('/tmp/self-coach.js')
          score_path = Path('/tmp/self-coach-score.js')
          payload = {
              'workflow': 'deploy-self-test',
              'repository': os.environ['REPOSITORY'],
              'sourceSha': os.environ['SOURCE_SHA'],
              'requestHttpStatus': int(os.environ.get('REQUEST_CODE', '0')),
              'requestResponse': decode(os.environ.get('REQUEST_BODY', '')),
              'latestBuildHttpStatus': int(os.environ.get('BUILD_CODE', '0')),
              'latestBuildStatus': os.environ.get('BUILD_STATUS', 'unknown'),
              'latestBuild': decode(os.environ.get('BUILD_BODY', '')),
              'liveCheck': {
                  'url': os.environ['LIVE_URL'],
                  'httpStatus': int(os.environ.get('LIVE_CODE', '0')),
                  'status': os.environ.get('LIVE_STATUS', 'not_verified'),
                  'title': os.environ.get('LIVE_TITLE', ''),
                  'coachButton': int(os.environ.get('LIVE_HAS_BUTTON', '0')) > 0,
                  'coachScriptLinked': int(os.environ.get('LIVE_HAS_COACH_SCRIPT', '0')) > 0,
                  'scoreCoachScriptLinked': int(os.environ.get('LIVE_HAS_SCORE_SCRIPT', '0')) > 0,
                  'coachScriptHttpStatus': int(os.environ.get('COACH_JS_CODE', '0')),
                  'coachContentMarker': int(os.environ.get('COACH_JS_MARKER', '0')) > 0,
                  'scoreCoachScriptHttpStatus': int(os.environ.get('SCORE_JS_CODE', '0')),
                  'scoreCoachContentMarker': int(os.environ.get('SCORE_JS_MARKER', '0')) > 0,
                  'sha256': hashlib.sha256(live_path.read_bytes()).hexdigest() if live_path.exists() else None,
                  'coachScriptSha256': hashlib.sha256(coach_path.read_bytes()).hexdigest() if coach_path.exists() else None,
                  'scoreCoachScriptSha256': hashlib.sha256(score_path.read_bytes()).hexdigest() if score_path.exists() else None,
              },
              'checkedAt': datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          Path('tests/self/deploy-status.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

          echo "request_code=${request_code}" >> "$GITHUB_OUTPUT"
          echo "build_status=${build_status}" >> "$GITHUB_OUTPUT"
          echo "live_status=${live_status}" >> "$GITHUB_OUTPUT"

      - name: Save deployment status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/self/deploy-status.json
          git commit -m "chore: record SELF INC. deployment [skip ci]" || exit 0
          git push

      - name: Verify deployment
        run: |
          test "${{ steps.deploy.outputs.request_code }}" = "201"
          test "${{ steps.deploy.outputs.build_status }}" = "built"
          test "${{ steps.deploy.outputs.live_status }}" = "verified"
