name: Fix KINGDOM card menu

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-kingdom-menu.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Normalize KINGDOM menu entries
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = 'index.html';
          let text = fs.readFileSync(path, 'utf8');

          const topLinks = [
            '            <a href="/cards/kingdom/" data-route="kingdomCards">킹덤대화카드 <small>핵심</small></a>',
            '            <a href="/cards/talkcard180/" data-route="talkcard180">톡카드 180 <small>→</small></a>',
            '            <a href="/cards/grow88/" data-route="grow88">Grow 88 <small>→</small></a>',
            '            <a href="/cards/mindset120/" data-route="mindset120">Mindset 120 <small>→</small></a>'
          ].join('\n');
          text = text.replace(
            /(<button class="nav-button" type="button" aria-haspopup="true">카드도구 <span aria-hidden="true">⌄<\/span><\/button>\n\s*<div class="dropdown" role="menu">\n)[\s\S]*?(\n\s*<\/div>\n\s*<\/div>\n\s*<a class="nav-link" href="\/lcms\/" data-route="lcms">LCMS<\/a>)/,
            `$1${topLinks}$2`
          );

          const categoryLinks = [
            '          <a href="/cards/kingdom/" data-route="kingdomCards">킹덤대화카드 <small>핵심</small></a>',
            '          <a href="/cards/talkcard180/" data-route="talkcard180">톡카드 180 <small>→</small></a>',
            '          <a href="/cards/grow88/" data-route="grow88">Grow 88 <small>→</small></a>',
            '          <a href="/cards/mindset120/" data-route="mindset120">Mindset 120 <small>→</small></a>'
          ].join('\n');
          text = text.replace(
            /(<article class="category" data-category="cards">\n\s*<h3>카드도구<\/h3>\n\s*<p>대화, 성장, 마인드셋 카드 콘텐츠입니다\.<\/p>\n)[\s\S]*?(\n\s*<\/article>\n\n\s*<article class="category" data-category="program">)/,
            `$1${categoryLinks}$2`
          );

          text = text.replace(/      kingdomCards: '\/cards\/kingdom\/',\n/g, '');
          text = text.replace("      talkcard180: '/cards/talkcard180/',", "      kingdomCards: '/cards/kingdom/',\n      talkcard180: '/cards/talkcard180/',");
          text = text.replace(/톡카드·Grow·Mindset|킹덤·톡카드·Grow/g, '킹덤·톡카드·Grow');

          fs.writeFileSync(path, text);
          NODE
      - name: Commit fix
        run: |
          if git diff --quiet -- index.html; then
            echo "No menu changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Normalize KINGDOM card menu placement"
          git push
