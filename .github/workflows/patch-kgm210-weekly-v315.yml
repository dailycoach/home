name: Patch KGM210 seven-week journey v3.15

on:
  workflow_dispatch:
  pull_request:
    paths:
      - tests/kgm210/index.html
      - tests/kgm210/kgm210-profile-engine-v314.js
      - tests/kgm210/kgm210-weekly-journey-engine-v315.js
      - tests/kgm210/kgm210-weekly-journey-engine-v315.test.js
      - tests/kgm210/kgm210-weekly-journey-ui-v315.js
      - tests/kgm210/kgm210-weekly-journey-v315.css
      - tests/kgm210/kgm210-weekly-journey-qa-v3151.js
      - tests/kgm210/kgm210-weekly-journey-qa-v3151.css
      - tests/kgm210/e2e/**
      - scripts/patch_kgm210_weekly_v315.py
      - .github/workflows/patch-kgm210-weekly-v315.yml
  push:
    branches:
      - feature/kgm210-growth-journey-v1
    paths:
      - tests/kgm210/index.html
      - tests/kgm210/kgm210-profile-engine-v314.js
      - tests/kgm210/kgm210-weekly-journey-engine-v315.js
      - tests/kgm210/kgm210-weekly-journey-engine-v315.test.js
      - tests/kgm210/kgm210-weekly-journey-ui-v315.js
      - tests/kgm210/kgm210-weekly-journey-v315.css
      - tests/kgm210/kgm210-weekly-journey-qa-v3151.js
      - tests/kgm210/kgm210-weekly-journey-qa-v3151.css
      - tests/kgm210/e2e/**
      - scripts/patch_kgm210_weekly_v315.py
      - .github/workflows/patch-kgm210-weekly-v315.yml

permissions:
  contents: write

jobs:
  test-and-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'feature/kgm210-growth-journey-v1' }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Validate seven-week journey engine
        run: node tests/kgm210/kgm210-weekly-journey-engine-v315.test.js

      - name: Check profile engine syntax
        run: node --check tests/kgm210/kgm210-profile-engine-v314.js

      - name: Check weekly engine syntax
        run: node --check tests/kgm210/kgm210-weekly-journey-engine-v315.js

      - name: Check weekly UI syntax
        run: node --check tests/kgm210/kgm210-weekly-journey-ui-v315.js

      - name: Check weekly QA syntax
        run: node --check tests/kgm210/kgm210-weekly-journey-qa-v3151.js

      - name: Check E2E test syntax
        run: node --check tests/kgm210/e2e/weekly-journey-v315.spec.js

      - name: Check Playwright config syntax
        run: node --check tests/kgm210/e2e/playwright.config.js

      - name: Inject or verify seven-week journey assets
        run: python scripts/patch_kgm210_weekly_v315.py

      - name: Verify bootstrap and QA assets
        run: |
          grep -q 'KGM_WEEKLY_V315_BOOTSTRAP' tests/kgm210/kgm210-profile-engine-v314.js
          grep -q 'data-kgm-weekly-qa-v3151="style"' tests/kgm210/index.html
          grep -q 'data-kgm-weekly-qa-v3151="script"' tests/kgm210/index.html
          grep -q 'visibleSevenDayTermsRewritten:true' tests/kgm210/kgm210-weekly-journey-qa-v3151.js
          grep -q 'beforeUnloadSave:true' tests/kgm210/kgm210-weekly-journey-qa-v3151.js
          grep -q 'separateViewedWeek:true' tests/kgm210/kgm210-weekly-journey-ui-v315.js

      - name: Commit generated index
        if: github.event_name == 'push' && github.actor != 'github-actions[bot]'
        run: |
          if git diff --quiet -- tests/kgm210/index.html; then
            echo "No generated index changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/kgm210/index.html
          git commit -m "feat: inject KGM210 seven-week QA v3.15.2 assets"
          git push origin HEAD:feature/kgm210-growth-journey-v1

  mobile-e2e:
    needs: test-and-patch
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'feature/kgm210-growth-journey-v1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Run mobile seven-week regression
        run: npx playwright test -c tests/kgm210/e2e/playwright.config.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kgm210-weekly-playwright-report
          path: tests/kgm210/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7
