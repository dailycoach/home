name: Deploy SELF INC. v9.3 score-aware coach guide

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/deploy-self-v93.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "deploy-self-v93"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate score-aware coach scripts
        run: |
          node --check tests/self/assets/self-v9-coach.js
          node --check tests/self/assets/self-v9-coach-score.js
          grep -q 'self-inc-version" content="9.3.0' tests/self/index.html
          grep -q 'self-v9-coach-score.js?v=9.3.0' tests/self/index.html
          grep -q '현재 점수 기반 KINGDOM 질문' tests/self/assets/self-v9-coach-score.js

      - name: Build and verify live v9.3
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          LIVE_URL: https://daily-coach-ing.com/tests/self/index.html
          SCORE_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-coach-score.js
        run: |
          set +e
          request_code=$(curl --silent --show-error --location \
            --output /tmp/request.json \
            --write-out "%{http_code}" \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${GH_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")

          build_status="unknown"
          build_body=""
          for attempt in $(seq 1 60); do
            sleep 4
            curl --silent --show-error --location \
              --output /tmp/build.json \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/builds/latest"
            build_body=$(cat /tmp/build.json 2>/dev/null || true)
            build_status=$(python -c 'import json; print(json.load(open("/tmp/build.json", encoding="utf-8")).get("status", "unknown"))' 2>/dev/null || echo unknown)
            if [ "${build_status}" = "built" ] || [ "${build_status}" = "errored" ]; then break; fi
          done

          live_code=0
          score_code=0
          live_status="not_verified"
          live_has_version=0
          live_has_score_script=0
          score_has_marker=0

          for attempt in $(seq 1 45); do
            sleep 4
            live_code=$(curl --silent --show-error --location \
              --output /tmp/live.html \
              --write-out "%{http_code}" \
              --header "Cache-Control: no-cache" \
              "${LIVE_URL}?v=9.3.0&sha=${SOURCE_SHA}&attempt=${attempt}")
            score_code=$(curl --silent --show-error --location \
              --output /tmp/score.js \
              --write-out "%{http_code}" \
              --header "Cache-Control: no-cache" \
              "${SCORE_URL}?v=9.3.0&sha=${SOURCE_SHA}&attempt=${attempt}")
            live_has_version=$(grep -c 'self-inc-version" content="9.3.0' /tmp/live.html 2>/dev/null || true)
            live_has_score_script=$(grep -c 'self-v9-coach-score.js?v=9.3.0' /tmp/live.html 2>/dev/null || true)
            score_has_marker=$(grep -c '현재 점수 기반 KINGDOM 질문' /tmp/score.js 2>/dev/null || true)
            if [ "${live_code}" = "200" ] \
              && [ "${score_code}" = "200" ] \
              && [ "${live_has_version}" -gt 0 ] \
              && [ "${live_has_score_script}" -gt 0 ] \
              && [ "${score_has_marker}" -gt 0 ]; then
              live_status="verified"
              break
            fi
          done

          export REQUEST_CODE="${request_code}"
          export BUILD_STATUS="${build_status}"
          export BUILD_BODY="${build_body}"
          export LIVE_CODE="${live_code}"
          export SCORE_CODE="${score_code}"
          export LIVE_HAS_VERSION="${live_has_version}"
          export LIVE_HAS_SCORE_SCRIPT="${live_has_score_script}"
          export SCORE_HAS_MARKER="${score_has_marker}"
          export LIVE_STATUS="${live_status}"

          python - <<'PY'
          import datetime, hashlib, json, os
          from pathlib import Path
          def decode(value):
              try: return json.loads(value)
              except Exception: return value
          live = Path('/tmp/live.html')
          score = Path('/tmp/score.js')
          payload = {
              'workflow': 'deploy-self-v93',
              'sourceSha': os.environ['SOURCE_SHA'],
              'requestHttpStatus': int(os.environ.get('REQUEST_CODE', '0')),
              'latestBuildStatus': os.environ.get('BUILD_STATUS', 'unknown'),
              'latestBuild': decode(os.environ.get('BUILD_BODY', '')),
              'liveCheck': {
                  'url': os.environ['LIVE_URL'],
                  'httpStatus': int(os.environ.get('LIVE_CODE', '0')),
                  'scoreScriptHttpStatus': int(os.environ.get('SCORE_CODE', '0')),
                  'version930': int(os.environ.get('LIVE_HAS_VERSION', '0')) > 0,
                  'scoreScriptLinked': int(os.environ.get('LIVE_HAS_SCORE_SCRIPT', '0')) > 0,
                  'scoreContentMarker': int(os.environ.get('SCORE_HAS_MARKER', '0')) > 0,
                  'status': os.environ.get('LIVE_STATUS', 'not_verified'),
                  'htmlSha256': hashlib.sha256(live.read_bytes()).hexdigest() if live.exists() else None,
                  'scoreScriptSha256': hashlib.sha256(score.read_bytes()).hexdigest() if score.exists() else None,
              },
              'checkedAt': datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          Path('tests/self/v93-deploy-status.json').write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

          echo "request_code=${request_code}" >> "$GITHUB_OUTPUT"
          echo "build_status=${build_status}" >> "$GITHUB_OUTPUT"
          echo "live_status=${live_status}" >> "$GITHUB_OUTPUT"

      - name: Save v9.3 deployment status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/self/v93-deploy-status.json
          git commit -m "chore: record SELF INC. v9.3 deployment [skip ci]" || exit 0
          git push

      - name: Verify v9.3 deployment
        run: |
          test "${{ steps.verify.outputs.request_code }}" = "201"
          test "${{ steps.verify.outputs.build_status }}" = "built"
          test "${{ steps.verify.outputs.live_status }}" = "verified"
