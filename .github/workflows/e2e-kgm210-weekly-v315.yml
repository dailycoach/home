name: E2E KGM210 seven-week journey

on:
  workflow_dispatch:
  pull_request:
    paths:
      - tests/kgm210/index.html
      - tests/kgm210/kgm210-profile-engine-v314.js
      - tests/kgm210/kgm210-weekly-journey-*.js
      - tests/kgm210/kgm210-weekly-journey-*.css
      - tests/kgm210/e2e/**
      - .github/workflows/e2e-kgm210-weekly-v315.yml
  push:
    branches:
      - feature/kgm210-growth-journey-v1
    paths:
      - tests/kgm210/index.html
      - tests/kgm210/kgm210-profile-engine-v314.js
      - tests/kgm210/kgm210-weekly-journey-*.js
      - tests/kgm210/kgm210-weekly-journey-*.css
      - tests/kgm210/e2e/**
      - .github/workflows/e2e-kgm210-weekly-v315.yml

permissions:
  contents: read

jobs:
  mobile-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || 'feature/kgm210-growth-journey-v1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Playwright
        run: |
          npm install --no-save @playwright/test
          npx playwright install --with-deps chromium

      - name: Run mobile seven-week regression
        run: npx playwright test -c tests/kgm210/e2e/playwright.config.js

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kgm210-weekly-playwright-report
          path: tests/kgm210/e2e/playwright-report
          if-no-files-found: ignore
          retention-days: 7
