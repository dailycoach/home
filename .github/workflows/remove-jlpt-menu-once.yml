name: Remove JLPT N2 menu link once

on:
  push:
    paths:
      - .github/workflows/remove-jlpt-menu-once.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-menu:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove homepage menu links
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          original = text

          removals = [
              '\n        <a class="nav-link" href="/jlpt-n2/" data-route="jlptN2">JLPT N2</a>',
              '\n          <a href="/jlpt-n2/" data-route="jlptN2">JLPT N2 모바일 단어장 <small>→</small></a>',
              '\n          <a href="/jlpt-n2/" data-route="jlptN2">JLPT N2</a>',
              "\n      jlptN2: '/jlpt-n2/',",
          ]

          for needle in removals:
              text = text.replace(needle, '')

          path.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/remove-jlpt-menu-once.yml')
          if workflow.exists():
              workflow.unlink()

          if text == original:
              print('No JLPT menu links were present; only removing workflow file.')
          PY

      - name: Commit removal
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/remove-jlpt-menu-once.yml
          git commit -m "Remove JLPT N2 link from homepage menu"
          git push
