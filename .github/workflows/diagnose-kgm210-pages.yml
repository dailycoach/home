name: Diagnose KGM210 Pages

# Temporary diagnostic workflow for the KGM210 live route.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/diagnose-kgm210-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate diagnostic report
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set +e
          REPORT="$RUNNER_TEMP/kgm210-pages-diagnostics.txt"
          TOKEN="${GITHUB_SHA}-$(date +%s)"
          BASE='https://daily-coach-ing.com/tests/kgm210'
          URL="${BASE}/?diagnose=${TOKEN}"

          {
            echo '=== LOCAL TITLE ==='
            grep -o '<title>[^<]*</title>' tests/kgm210/index.html | head -n 1
            echo
            echo '=== LOCAL ASSETS ==='
            grep -o 'kgm210-[^" ]*' tests/kgm210/index.html | sort -u
            echo

            echo '=== PAGES SETTINGS ==='
            gh api "repos/${GITHUB_REPOSITORY}/pages"
            echo "pages_settings_status=$?"
            echo

            echo '=== LATEST PAGES BUILD ==='
            gh api "repos/${GITHUB_REPOSITORY}/pages/builds/latest"
            echo "latest_build_status=$?"
            echo

            echo '=== REQUEST NEW PAGES BUILD ==='
            gh api --method POST "repos/${GITHUB_REPOSITORY}/pages/builds"
            echo "request_build_status=$?"
            echo

            echo '=== LIVE URL ==='
            echo "$URL"
            echo

            echo '=== LIVE HEADERS ==='
            curl -sSIL -H 'Cache-Control: no-cache, no-store, max-age=0' -H 'Pragma: no-cache' "$URL"
            echo

            echo '=== LIVE TITLE ==='
            curl -fsSL -H 'Cache-Control: no-cache, no-store, max-age=0' -H 'Pragma: no-cache' "$URL" \
              | grep -o '<title>[^<]*</title>' | head -n 1
            echo

            echo '=== LIVE ASSET MARKERS ==='
            curl -fsSL -H 'Cache-Control: no-cache, no-store, max-age=0' -H 'Pragma: no-cache' "$URL" \
              | grep -Eo 'data-kgm-(profile-v314|weekly-qa-v3151)="[^"]+"|7일 성장기록|7주 성장여정' \
              | sort -u || true
            echo

            echo '=== LIVE PROFILE ENGINE ==='
            curl -fsSL -H 'Cache-Control: no-cache' "${BASE}/kgm210-profile-engine-v314.js?diagnose=${TOKEN}" \
              | grep -Eo 'KGM210 profile engine v3\.14\.0|KGM_WEEKLY_V315_BOOTSTRAP' \
              | sort -u
            echo

            echo '=== LIVE WEEKLY ENGINE ==='
            curl -fsSL -H 'Cache-Control: no-cache' "${BASE}/kgm210-weekly-journey-engine-v315.js?diagnose=${TOKEN}" \
              | grep -Eo 'KGM210 weekly journey engine v3\.15\.0|KGM210:seven-week-journey:v1|kgm210:seven-week-journey:v1' \
              | sort -u
            echo

            echo '=== LIVE WEEKLY UI ==='
            curl -fsSL -H 'Cache-Control: no-cache' "${BASE}/kgm210-weekly-journey-ui-v315.js?diagnose=${TOKEN}" \
              | grep -Eo 'KGM210 weekly journey UI v3\.15\.2|separateViewedWeek:true' \
              | sort -u
            echo

            echo '=== LIVE WEEKLY QA ==='
            curl -fsSL -H 'Cache-Control: no-cache' "${BASE}/kgm210-weekly-journey-qa-v3151.js?diagnose=${TOKEN}" \
              | grep -Eo 'KGM210 weekly journey QA v3\.15\.4|entryRebuild:true|immediateAddedTextCleanup:true' \
              | sort -u
          } > "$REPORT" 2>&1

          cat "$REPORT"
          cp "$REPORT" kgm210-pages-diagnostics.txt
          set -e

      - name: Upload diagnostic report
        uses: actions/upload-artifact@v4
        with:
          name: kgm210-pages-diagnostics
          path: kgm210-pages-diagnostics.txt
          retention-days: 7
