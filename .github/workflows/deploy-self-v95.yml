name: Deploy SELF INC. v9.5 synthesis

on:
  push:
    branches: ["main"]
    paths:
      - "tests/self/**"
      - ".github/workflows/deploy-self-v95.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "deploy-self-v95"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate scripts
        run: |
          node --check tests/self/assets/self-v9-data.js
          node --check tests/self/assets/self-v9.js
          node --check tests/self/assets/self-v9-hotfix.js
          node --check tests/self/assets/self-v9-coach.js
          node --check tests/self/assets/self-v9-coach-score.js
          node --check tests/self/assets/self-v9-coach-synthesis.js

      - name: Build and verify v9.5
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          LIVE_URL: https://daily-coach-ing.com/tests/self/index.html
          SYNTHESIS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-coach-synthesis.js
        run: |
          set -euo pipefail
          request_code=$(curl -sS -L -o /tmp/request.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")
          test "${request_code}" = "201"

          build_status="queued"
          for attempt in $(seq 1 48); do
            sleep 5
            curl -sS -L -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/builds/latest" > /tmp/build.json
            build_status=$(python -c 'import json; print(json.load(open("/tmp/build.json", encoding="utf-8")).get("status", "unknown"))')
            if [ "${build_status}" = "built" ] || [ "${build_status}" = "errored" ]; then break; fi
          done
          test "${build_status}" = "built"

          verified=0
          live_code=0
          synthesis_code=0
          for attempt in $(seq 1 36); do
            sleep 5
            live_code=$(curl -sS -L -o /tmp/live.html -w "%{http_code}" -H "Cache-Control: no-cache" "${LIVE_URL}?v=95&sha=${SOURCE_SHA}&a=${attempt}")
            synthesis_code=$(curl -sS -L -o /tmp/synthesis.js -w "%{http_code}" -H "Cache-Control: no-cache" "${SYNTHESIS_URL}?v=95&sha=${SOURCE_SHA}&a=${attempt}")
            if [ "${live_code}" = "200" ] \
              && [ "${synthesis_code}" = "200" ] \
              && grep -q 'self-inc-version" content="9.5.0' /tmp/live.html \
              && grep -q 'self-v9-coach-synthesis.js?v=9.5.0' /tmp/live.html \
              && grep -q '5영역 종합상태 · 코치용 1페이지 브리핑' /tmp/synthesis.js \
              && grep -q '최저 2영역 조합 해석' /tmp/synthesis.js \
              && grep -q '이번 회기에 우선 사용할 KINGDOM 질문 5개' /tmp/synthesis.js; then
              verified=1
              break
            fi
          done
          test "${verified}" = "1"

          export REQUEST_CODE="${request_code}" BUILD_STATUS="${build_status}" LIVE_CODE="${live_code}" SYNTHESIS_CODE="${synthesis_code}" VERIFIED="${verified}"
          python - <<'PY'
          import datetime, hashlib, json, os
          from pathlib import Path
          payload = {
              "workflow": "deploy-self-v95",
              "sourceSha": os.environ["SOURCE_SHA"],
              "requestHttpStatus": int(os.environ["REQUEST_CODE"]),
              "latestBuildStatus": os.environ["BUILD_STATUS"],
              "liveCheck": {
                  "url": os.environ["LIVE_URL"],
                  "httpStatus": int(os.environ["LIVE_CODE"]),
                  "synthesisScriptHttpStatus": int(os.environ["SYNTHESIS_CODE"]),
                  "version950": True,
                  "synthesisScriptLinked": True,
                  "fiveDomainSynthesis": True,
                  "lowestPairAnalysis": True,
                  "onePageCoachBrief": True,
                  "kingdomFiveQuestions": True,
                  "status": "verified" if os.environ["VERIFIED"] == "1" else "not_verified",
                  "htmlSha256": hashlib.sha256(Path('/tmp/live.html').read_bytes()).hexdigest(),
                  "synthesisScriptSha256": hashlib.sha256(Path('/tmp/synthesis.js').read_bytes()).hexdigest(),
              },
              "checkedAt": datetime.datetime.now(datetime.timezone.utc).isoformat(),
          }
          Path('tests/self/deploy-status-v95.json').write_text(json.dumps(payload, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          PY

      - name: Save status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/self/deploy-status-v95.json
          git commit -m "chore: record SELF INC. v9.5 deployment [skip ci]" || exit 0
          git push
