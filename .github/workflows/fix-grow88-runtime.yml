name: Fix KINGDOM35 runtime syntax

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/fix-grow88-runtime.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fix multiline JavaScript string
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('cards/grow88/index.html')
          text = path.read_text(encoding='utf-8')

          pattern = re.compile(
              r"body:'KINGDOM은 질문을 순서대로 모두 읽는 대본이 아닙니다\. 고객의 주도권을 지키면서도 20분 안에 목표·현실·자원·선택·실행·성장을 놓치지 않도록 코치에게 대화의 지도를 제공합니다\.\s*각 구간의 다섯 질문은 모두 사용해야 하는 문항이 아니라, 고객의 답에 따라 선택하는 질문 후보입니다\. 먼저 듣고 반영한 뒤 필요한 질문만 선택합니다\.'",
              re.S,
          )
          replacement = "body:`KINGDOM은 질문을 순서대로 모두 읽는 대본이 아닙니다. 고객의 주도권을 지키면서도 20분 안에 목표·현실·자원·선택·실행·성장을 놓치지 않도록 코치에게 대화의 지도를 제공합니다.\\n\\n각 구간의 다섯 질문은 모두 사용해야 하는 문항이 아니라, 고객의 답에 따라 선택하는 질문 후보입니다. 먼저 듣고 반영한 뒤 필요한 질문만 선택합니다.`"
          new_text, count = pattern.subn(replacement, text, count=1)
          if count != 1:
              raise SystemExit(f'Expected one replacement, got {count}')
          path.write_text(new_text, encoding='utf-8')
          PY
      - name: Commit fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/grow88/index.html
          git commit -m "Fix KINGDOM35 runtime syntax error"
          git push
