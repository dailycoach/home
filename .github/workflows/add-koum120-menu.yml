name: Add KOUM 120 to card menus

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/add-koum120-menu.yml

permissions:
  contents: write

jobs:
  patch-index:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add KOUM 120 to navigation and full menu
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          if 'data-route="koum120"' not in text:
              output = []
              for line in text.splitlines():
                  output.append(line)
                  if (
                      'data-route="kingdomCards"' in line
                      and '킹덤대화카드' in line
                      and '<small>' in line
                  ):
                      indent = line[:len(line) - len(line.lstrip())]
                      output.append(
                          f'{indent}<a href="/cards/koum120/" data-route="koum120">KOUM 대화카드 120 <small>NEW</small></a>'
                      )
              text = '\n'.join(output) + ('\n' if text.endswith('\n') else '')

          route_anchor = "      kingdomCards: '/cards/kingdom/',"
          route_line = "      koum120: '/cards/koum120/',"
          if route_line not in text:
              text = text.replace(route_anchor, route_anchor + '\n' + route_line, 1)

          hero_old = '<small>킹덤·톡카드·Grow</small>'
          hero_new = '<small>킹덤·KOUM·톡카드·Grow</small>'
          text = text.replace(hero_old, hero_new)

          footer_anchor = '          <a href="/cards/kingdom/" data-route="kingdomCards">킹덤대화카드</a>'
          footer_line = '          <a href="/cards/koum120/" data-route="koum120">KOUM 대화카드 120</a>'
          if footer_line not in text:
              text = text.replace(footer_anchor, footer_anchor + '\n' + footer_line, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit menu update
        shell: bash
        run: |
          if git diff --quiet -- index.html; then
            echo "No index change required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add KOUM 120 to card menus"
          git push
