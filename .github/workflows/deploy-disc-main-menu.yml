name: Deploy DISC main menu entries

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/deploy-disc-main-menu.yml"
      - "index.html"
      - "pages.json"
      - "tests/disc16/**"
      - "tests/disc16-youth/**"
      - "ops/disc-main-menu-trigger.txt"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: "deploy-disc-main-menu"
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Patch fixed menu entries
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          adult = 'data-route="disc16"'
          youth = 'data-route="disc16Youth"'

          if adult not in text or youth not in text:
              replacements = [
                  (
                      '''            <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
            <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>''',
                      '''            <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
            <a href="/tests/disc16/" data-route="disc16">DISC16 행동스타일 <small>NEW</small></a>
            <a href="/tests/disc16-youth/" data-route="disc16Youth">DISC16 청소년 관계 <small>NEW</small></a>
            <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>'''
                  ),
                  (
                      '''          <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
          <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>''',
                      '''          <a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>
          <a href="/tests/disc16/" data-route="disc16">DISC16 행동스타일 검사 <small>NEW</small></a>
          <a href="/tests/disc16-youth/" data-route="disc16Youth">DISC16 청소년 관계행동 <small>NEW</small></a>
          <a href="/tests/learning/" data-route="learning">학습 진단 <small>→</small></a>'''
                  ),
                  (
                      '''      kgm210: '/tests/kgm210/',
      learning: '/tests/learning/',''',
                      '''      kgm210: '/tests/kgm210/',
      disc16: '/tests/disc16/',
      disc16Youth: '/tests/disc16-youth/',
      learning: '/tests/learning/','''
                  )
              ]
              for before, after in replacements:
                  if before not in text:
                      raise SystemExit(f'메뉴 기준 문자열을 찾지 못했습니다: {before[:80]}')
                  text = text.replace(before, after, 1)

          required = [
              'href="/tests/disc16/" data-route="disc16"',
              'href="/tests/disc16-youth/" data-route="disc16Youth"',
              "disc16: '/tests/disc16/'",
              "disc16Youth: '/tests/disc16-youth/'",
          ]
          missing = [item for item in required if item not in text]
          if missing:
              raise SystemExit('필수 DISC 메뉴 누락: ' + ', '.join(missing))

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit menu patch
        id: commit
        run: |
          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "fix: permanently expose DISC adult and youth menus [skip ci]"
            git push origin main
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Request GitHub Pages build
        id: deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          request_code=$(curl -sS -L -o /tmp/request.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")
          echo "request_code=${request_code}" >> "$GITHUB_OUTPUT"
          test "${request_code}" = "201"

      - name: Wait for Pages and verify live menu
        id: verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          LIVE_URL: https://daily-coach-ing.com/
        run: |
          build_status="unknown"
          for attempt in $(seq 1 48); do
            sleep 5
            curl -sS -L -o /tmp/build.json \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/builds/latest"
            build_status=$(python -c 'import json; print(json.load(open("/tmp/build.json", encoding="utf-8")).get("status", "unknown"))' 2>/dev/null || echo unknown)
            [ "${build_status}" = "built" ] && break
            [ "${build_status}" = "errored" ] && break
          done

          live_status="not_verified"
          adult_count=0
          youth_count=0
          live_code=0
          for attempt in $(seq 1 36); do
            sleep 5
            live_code=$(curl -sS -L -o /tmp/live.html -w "%{http_code}" -H "Cache-Control: no-cache" "${LIVE_URL}?v=${SOURCE_SHA}&a=${attempt}")
            adult_count=$(grep -c '/tests/disc16/' /tmp/live.html 2>/dev/null || true)
            youth_count=$(grep -c '/tests/disc16-youth/' /tmp/live.html 2>/dev/null || true)
            if [ "${live_code}" = "200" ] && [ "${adult_count}" -ge 2 ] && [ "${youth_count}" -ge 2 ]; then
              live_status="verified"
              break
            fi
          done

          echo "build_status=${build_status}" >> "$GITHUB_OUTPUT"
          echo "live_status=${live_status}" >> "$GITHUB_OUTPUT"
          echo "live_code=${live_code}" >> "$GITHUB_OUTPUT"
          echo "adult_count=${adult_count}" >> "$GITHUB_OUTPUT"
          echo "youth_count=${youth_count}" >> "$GITHUB_OUTPUT"

          test "${build_status}" = "built"
          test "${live_status}" = "verified"
