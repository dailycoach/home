name: Deploy SELF INC. v9.8.1 interaction and Gen Z color

on:
  push:
    branches: ["main"]
    paths:
      - "tests/self/index.html"
      - "tests/self/assets/self-v9-coach-clean.js"
      - "tests/self/assets/self-v9-genz.css"
      - "tests/self/assets/self-v9-editorial.css"
      - "tests/self/assets/self-v9-editorial-entry.css"
      - ".github/workflows/deploy-self-v962.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

concurrency:
  group: deploy-self-v981
  cancel-in-progress: true

jobs:
  deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate coach JavaScript
        run: |
          node --check tests/self/assets/self-v9-coach-clean.js
          node --check tests/self/assets/self-v9-coach-interaction.js
          node --check tests/self/assets/self-v9-coach-synthesis.js

      - name: Build and verify
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          SOURCE_SHA: ${{ github.sha }}
          LIVE_URL: https://daily-coach-ing.com/tests/self/index.html
          CLEAN_JS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-coach-clean.js
          EDITORIAL_CSS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-editorial.css
          ENTRY_CSS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-editorial-entry.css
          GENZ_CSS_URL: https://daily-coach-ing.com/tests/self/assets/self-v9-genz.css
        run: |
          set -e
          request_code=$(curl -sSL -o /tmp/request.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPOSITORY}/pages/builds")

          build_status="queued"
          for attempt in $(seq 1 48); do
            sleep 5
            curl -sSL -o /tmp/build.json \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${REPOSITORY}/pages/builds/latest"
            build_status=$(python -c 'import json; print(json.load(open("/tmp/build.json")).get("status", "unknown"))')
            [ "${build_status}" = "built" ] && break
            [ "${build_status}" = "errored" ] && exit 1
          done

          live_status="not_verified"
          for attempt in $(seq 1 36); do
            sleep 5
            html_code=$(curl -sSL -o /tmp/live.html -w "%{http_code}" -H "Cache-Control: no-cache" "${LIVE_URL}?v=${SOURCE_SHA}-${attempt}")
            js_code=$(curl -sSL -o /tmp/clean.js -w "%{http_code}" -H "Cache-Control: no-cache" "${CLEAN_JS_URL}?v=${SOURCE_SHA}-${attempt}")
            css_code=$(curl -sSL -o /tmp/editorial.css -w "%{http_code}" -H "Cache-Control: no-cache" "${EDITORIAL_CSS_URL}?v=${SOURCE_SHA}-${attempt}")
            entry_code=$(curl -sSL -o /tmp/entry.css -w "%{http_code}" -H "Cache-Control: no-cache" "${ENTRY_CSS_URL}?v=${SOURCE_SHA}-${attempt}")
            genz_code=$(curl -sSL -o /tmp/genz.css -w "%{http_code}" -H "Cache-Control: no-cache" "${GENZ_CSS_URL}?v=${SOURCE_SHA}-${attempt}")

            if [ "${html_code}" = "200" ] \
              && [ "${js_code}" = "200" ] \
              && [ "${css_code}" = "200" ] \
              && [ "${entry_code}" = "200" ] \
              && [ "${genz_code}" = "200" ] \
              && grep -q 'self-inc-version" content="9.8.1' /tmp/live.html \
              && grep -q 'KINGDOM COACH GUIDE' /tmp/live.html \
              && grep -q 'self-v9-genz.css?v=9.8.1' /tmp/live.html \
              && grep -q 'self-v9-coach-clean.js?v=9.8.1' /tmp/live.html \
              && grep -q 'pendingScrollTop' /tmp/clean.js \
              && grep -q 'details.open = advancedOpen' /tmp/clean.js \
              && grep -q 'coachDetailOpen' /tmp/clean.js \
              && grep -q -- '--genz-blue:#3157ff' /tmp/genz.css \
              && grep -q -- '--genz-lime:#c7ff3d' /tmp/genz.css \
              && grep -q 'data-coach-state="low"' /tmp/genz.css \
              && grep -q 'data-coach-state="high"' /tmp/genz.css \
              && grep -q '.result-cover' /tmp/genz.css \
              && grep -q '.coach-state-card.is-psychology' /tmp/genz.css \
              && grep -q 'prefers-reduced-motion' /tmp/genz.css; then
              live_status="verified"
              break
            fi
          done

          export REQUEST_CODE="${request_code}" BUILD_STATUS="${build_status}" LIVE_STATUS="${live_status}"
          export HTML_CODE="${html_code}" JS_CODE="${js_code}" CSS_CODE="${css_code}" ENTRY_CODE="${entry_code}" GENZ_CODE="${genz_code}" SOURCE_SHA
          python - <<'PY'
          import datetime, hashlib, json, os
          from pathlib import Path
          def sha(path):
              p=Path(path)
              return hashlib.sha256(p.read_bytes()).hexdigest() if p.exists() else None
          payload={
            "workflow":"deploy-self-v981",
            "sourceSha":os.environ["SOURCE_SHA"],
            "requestHttpStatus":int(os.environ["REQUEST_CODE"]),
            "latestBuildStatus":os.environ["BUILD_STATUS"],
            "liveCheck":{
              "url":"https://daily-coach-ing.com/tests/self/index.html",
              "httpStatus":int(os.environ["HTML_CODE"]),
              "cleanScriptHttpStatus":int(os.environ["JS_CODE"]),
              "editorialCssHttpStatus":int(os.environ["CSS_CODE"]),
              "entryEditorialCssHttpStatus":int(os.environ["ENTRY_CODE"]),
              "genzCssHttpStatus":int(os.environ["GENZ_CODE"]),
              "version981":True,
              "kingdomIdentityPreserved":True,
              "detailOpenStatePreserved":True,
              "detailScrollPreserved":True,
              "lowHighColorFeedback":True,
              "genzColorLayer":True,
              "editorialFunctionsPreserved":True,
              "status":os.environ["LIVE_STATUS"],
              "htmlSha256":sha("/tmp/live.html"),
              "cleanScriptSha256":sha("/tmp/clean.js"),
              "editorialCssSha256":sha("/tmp/editorial.css"),
              "entryEditorialCssSha256":sha("/tmp/entry.css"),
              "genzCssSha256":sha("/tmp/genz.css")
            },
            "checkedAt":datetime.datetime.now(datetime.timezone.utc).isoformat()
          }
          Path("tests/self/deploy-status-v981.json").write_text(json.dumps(payload,ensure_ascii=False,indent=2)+"\n",encoding="utf-8")
          PY

          test "${request_code}" = "201"
          test "${build_status}" = "built"
          test "${live_status}" = "verified"

      - name: Save deployment status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/self/deploy-status-v981.json
          git commit -m "chore: record SELF INC. v9.8.1 deployment [skip ci]" || exit 0
          git push