name: Sync KINGDOM22 to live site

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-kingdom22-live.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Copy KINGDOM22 into live route
        shell: bash
        run: |
          mkdir -p cards/grow88
          curl -fsSL "https://raw.githubusercontent.com/dailycoach/grow88/main/index.html" -o cards/grow88/index.html
      - name: Commit live route
        shell: bash
        run: |
          if git diff --quiet -- cards/grow88/index.html; then
            echo "Live route is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cards/grow88/index.html
          git commit -m "Deploy KINGDOM22 KAC Practice to live route"
          git push
