name: Check LMC Academy

on:
  pull_request:
    paths:
      - "lcms/academy/**"
      - "scripts/check-lmc-academy.mjs"
      - ".github/workflows/check-lmc-academy.yml"
  push:
    branches: ["main"]
    paths:
      - "lcms/academy/**"
      - "scripts/check-lmc-academy.mjs"
      - ".github/workflows/check-lmc-academy.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Check JavaScript syntax
        run: node --check lcms/academy/academy.js
      - name: Check LMC Academy structure
        run: node scripts/check-lmc-academy.mjs
