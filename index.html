<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>DAILYCOACHING</title>
  <style>html,body{margin:0;background:#061528;color:#fff;font-family:system-ui,sans-serif}.loading{min-height:100vh;display:grid;place-items:center}.loading p{opacity:.7}</style>
</head>
<body>
  <div class="loading"><p>DAILYCOACHING을 불러오는 중입니다.</p></div>
  <script>
    fetch('/index-source-disc.html?v=20260722-coaching-flex-move', {cache:'no-store'})
      .then(r => textOrThrow(r))
      .then(html => {
        const anchor = '<a href="/tests/kgm210/" data-route="kgm210">KGM210 성장코칭 <small>→</small></a>';
        const links = `${anchor}\n            <a href="/tests/flourish-awareness/" data-route="flourishAwareness">플로리싱 × 알아차림 <small>NEW</small></a>\n            <a href="/tests/disc16/" data-route="disc16">DISC16 행동스타일 검사 <small>NEW</small></a>\n            <a href="/tests/disc16-youth/" data-route="disc16Youth">DISC16 청소년 관계행동 <small>NEW</small></a>`;
        html = html.replaceAll(anchor, links);
        html = html.replace("      kgm210: '/tests/kgm210/',\n      flourishAwareness: '/tests/flourish-awareness/',", "      kgm210: '/tests/kgm210/',\n      disc16: '/tests/disc16/',\n      disc16Youth: '/tests/disc16-youth/',");

        const careerGameUrl = 'https://career-deduction-game.dailycoaching.chatgpt.site';
        const desktopActivityAnchor = '<a href="/activities/wilderness-survival/" data-route="wildernessSurvival">광야 서바이벌 <small>→</small></a>';
        const panelActivityAnchor = '<a href="/activities/wilderness-survival/" data-route="wildernessSurvival">광야 서바이벌 활동도구 <small>→</small></a>';
        const footerActivityAnchor = '<a href="/activities/wilderness-survival/" data-route="wildernessSurvival">활동도구</a>';

        const desktopCareerLink = `<a href="${careerGameUrl}" target="_blank" rel="noopener noreferrer">내 직업을 맞춰봐! <small>NEW</small></a>`;
        const panelCareerLink = `<a href="${careerGameUrl}" target="_blank" rel="noopener noreferrer">내 직업을 맞춰봐! <small>NEW</small></a>`;
        const footerCareerLink = `<a href="${careerGameUrl}" target="_blank" rel="noopener noreferrer">내 직업을 맞춰봐</a>`;
        const flexMoveLink = '<a href="/activities/coaching-flex-move/" data-route="coachingFlexMove">COACHING FLEX MOVE <small>NEW</small></a>';
        const flexMovePanelLink = '<a href="/activities/coaching-flex-move/" data-route="coachingFlexMove">COACHING FLEX MOVE · 전문가 사고 학습 <small>NEW</small></a>';
        const flexMoveFooterLink = '<a href="/activities/coaching-flex-move/" data-route="coachingFlexMove">COACHING FLEX MOVE</a>';

        if (!html.includes(`${desktopCareerLink}\n            ${desktopActivityAnchor}`)) {
          html = html.replace(desktopActivityAnchor, `${desktopCareerLink}\n            ${desktopActivityAnchor}`);
        }
        if (!html.includes(`${panelCareerLink}\n          ${panelActivityAnchor}`)) {
          html = html.replace(panelActivityAnchor, `${panelCareerLink}\n          ${panelActivityAnchor}`);
        }
        if (!html.includes(`${footerActivityAnchor}\n          ${footerCareerLink}`)) {
          html = html.replace(footerActivityAnchor, `${footerActivityAnchor}\n          ${footerCareerLink}`);
        }

        if (!html.includes(flexMoveLink)) {
          html = html.replace(desktopActivityAnchor, `${flexMoveLink}\n            ${desktopActivityAnchor}`);
        }
        if (!html.includes(flexMovePanelLink)) {
          html = html.replace(panelActivityAnchor, `${flexMovePanelLink}\n          ${panelActivityAnchor}`);
        }
        if (!html.includes(flexMoveFooterLink)) {
          html = html.replace(footerActivityAnchor, `${footerActivityAnchor}\n          ${flexMoveFooterLink}`);
        }
        html = html.replace("      liveBoard: '/activities/live-board/',", "      coachingFlexMove: '/activities/coaching-flex-move/',\n      liveBoard: '/activities/live-board/',");

        const maeumFooterLink = '<a href="https://maeum-library-talk.dailycoaching.chatgpt.site" data-route="maumLibrary" target="_blank" rel="noopener noreferrer">마음서재</a>';
        const operatorFooterLink = `${maeumFooterLink}\n          <a href="/operator/" aria-label="마음서재 운영자 전용 관문">운영자</a>`;
        if (!html.includes('href="/operator/"')) html = html.replace(maeumFooterLink, operatorFooterLink);

        document.open(); document.write(html); document.close();
      })
      .catch(() => {
        document.body.innerHTML = '<div class="loading"><p>페이지를 불러오지 못했습니다. 잠시 후 새로고침해 주세요.</p></div>';
      });

    function textOrThrow(response) {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.text();
    }
  </script>
</body>
</html>
