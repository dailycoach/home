<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>대화 질문 카드 180</title>
  <style>
    :root{
      --ink:#14131a;
      --panel: rgba(255,255,255,0.82);
      --stroke: rgba(20,19,26,0.10);
      --shadow: 0 18px 55px rgba(20,19,26,0.10);

      --r24:24px;
      --r28:28px;
      --tap: 52px;

      /* theme vars */
      --bgA:#f3fbff;
      --bgB:#eef6ff;
      --bgC:#f4fffd;
      --accent:#2563eb;
      --themeBadgeBg: rgba(255,255,255,0.70);
      --themeBadgeBd: rgba(20,19,26,0.12);
      --themeBadgeTx: rgba(20,19,26,0.86);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo","Noto Sans KR","Malgun Gothic", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(900px 520px at 18% 10%, color-mix(in srgb, var(--accent) 18%, transparent), transparent 60%),
        radial-gradient(900px 520px at 86% 6%, rgba(236,72,153,0.10), transparent 60%),
        radial-gradient(900px 520px at 60% 88%, rgba(6,182,212,0.12), transparent 60%),
        linear-gradient(180deg, var(--bgA), var(--bgB) 45%, var(--bgC));
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x:hidden;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
      padding: 18px 16px calc(28px + env(safe-area-inset-bottom));
      min-height: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .shell{
      width:100%;
      border-radius: var(--r28);
      border: 1px solid var(--stroke);
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow:hidden;
    }

    header{
      padding: 18px 18px 14px;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      border-bottom: 1px solid rgba(20,19,26,0.06);
      background:
        radial-gradient(520px 160px at 15% 0%, rgba(255,255,255,0.55), transparent 70%),
        radial-gradient(520px 160px at 85% 0%, rgba(255,255,255,0.40), transparent 70%),
        transparent;
    }

    .brand{ display:flex; flex-direction:column; gap:6px; min-width:0; }
    .title{
      display:flex; align-items:center; gap:10px;
      font-weight: 860;
      letter-spacing:-0.02em;
      font-size: 16px;
      line-height:1.2;
      white-space:nowrap;
    }
    .dot{
      width: 10px; height: 10px; border-radius: 99px;
      background: conic-gradient(from 180deg, var(--accent), rgba(236,72,153,0.92), rgba(6,182,212,0.92), var(--accent));
      box-shadow: 0 10px 18px rgba(20,19,26,0.10);
      flex:0 0 auto;
    }
    .sub{
      margin:0;
      color: rgba(74,70,86,0.90);
      font-size: 12.5px;
      line-height: 1.45;
    }

    .status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(20,19,26,0.10);
      background: rgba(255,255,255,0.78);
      box-shadow: 0 10px 18px rgba(20,19,26,0.06);
      user-select:none;
      white-space:nowrap;
      height: 40px;
      color: rgba(74,70,86,0.95);
      font-size:12.5px;
    }
    .status strong{ color: var(--ink); font-weight:850; }

    .content{ padding: 18px; }

    .stage{
      display:grid;
      grid-template-columns: 1fr;
      gap: 14px;
      align-items:stretch;
    }

    .card{
      border-radius: var(--r28);
      border: 1px solid rgba(20,19,26,0.10);
      overflow:hidden;
      min-height: 360px;
      box-shadow: 0 16px 40px rgba(20,19,26,0.10);
      background:
        radial-gradient(720px 320px at 20% 10%, rgba(255,255,255,0.50), transparent 65%),
        radial-gradient(720px 320px at 85% 0%, rgba(255,255,255,0.35), transparent 70%),
        radial-gradient(720px 320px at 60% 95%, rgba(255,255,255,0.32), transparent 70%),
        linear-gradient(180deg, var(--bgA), var(--bgB) 45%, var(--bgC));
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 18px;
      position:relative;
    }

    .themeBadge{
      position:absolute;
      top: 14px;
      right: 14px;
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 8px 10px;
      border-radius: 999px;
      border: 1px solid var(--themeBadgeBd);
      background: var(--themeBadgeBg);
      color: var(--themeBadgeTx);
      font-size: 12.5px;
      font-weight: 850;
      letter-spacing: -0.01em;
      user-select:none;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 10px 22px rgba(20,19,26,0.08);
    }
    .themeDot{
      width: 9px; height: 9px; border-radius: 99px;
      background: var(--accent);
      box-shadow: 0 10px 18px color-mix(in srgb, var(--accent) 20%, transparent);
      flex:0 0 auto;
    }

    .question{
      margin:0;
      width: min(820px, 100%);
      text-align:center;
      color: rgba(20,19,26,0.92);
      font-size: clamp(20px, 3.4vw, 32px);
      line-height: 1.55;
      letter-spacing: -0.02em;
      font-weight: 900;
      word-break: keep-all;
      padding: 12px 10px;
    }

    .glow{
      position:absolute;
      inset:-2px;
      pointer-events:none;
      border-radius: var(--r28);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.35);
      opacity: 0.85;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
    }

    .btn{
      min-height: var(--tap);
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(20,19,26,0.10);
      background: rgba(255,255,255,0.86);
      box-shadow: 0 12px 26px rgba(20,19,26,0.06);
      display:inline-flex;
      align-items:center;
      gap:10px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, box-shadow .12s ease, opacity .12s ease;
      white-space:nowrap;
      color: rgba(20,19,26,0.92);
      font-weight: 800;
    }
    .btn:hover{ transform: translateY(-1px); box-shadow: 0 14px 28px rgba(20,19,26,0.10); }
    .btn:active{ transform: translateY(0); }
    .btn:disabled{ opacity:0.55; cursor:not-allowed; transform:none; }

    .btn.primary{
      color:#fff;
      border-color: rgba(20,19,26,0.08);
      background: linear-gradient(135deg, rgba(20,19,26,0.92), rgba(20,19,26,0.78));
      box-shadow: 0 16px 34px rgba(20,19,26,0.16);
    }

    .btnRowRight{ display:flex; gap:10px; flex-wrap:wrap; justify-content:flex-end; }

    .idle{
      border-radius: var(--r28);
      border: 1px solid rgba(20,19,26,0.08);
      background: rgba(255,255,255,0.72);
      box-shadow: 0 12px 28px rgba(20,19,26,0.06);
      padding: 18px;
      display:flex;
      flex-direction:column;
      gap: 12px;
      align-items:center;
      text-align:center;
    }
    .idle h2{
      margin: 0;
      font-size: 18px;
      letter-spacing:-0.02em;
      font-weight: 950;
    }
    .idle p{
      margin: 0;
      color: rgba(74,70,86,0.92);
      font-size: 13.5px;
      line-height: 1.55;
    }

    :focus-visible{
      outline: 3px solid rgba(20,19,26,0.22);
      outline-offset: 2px;
      border-radius: 14px;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="shell" role="application" aria-label="대화 질문 카드 180">

      <header>
        <div class="brand">
          <div class="title"><span class="dot" aria-hidden="true"></span>12가지 대화 질문 카드 180</div>
          <p class="sub">관심과 호기심은 사랑입니다
</p>
        </div>
        <div class="status" title="진행 상태">
          <span>진행</span> <strong id="progress">0</strong>/<strong id="total">180</strong>
        </div>
      </header>

      <div class="content">
        <div class="stage">

          <div class="card" aria-label="질문 카드">
            <div class="glow" aria-hidden="true"></div>

            <div class="themeBadge" id="themeBadge" style="display:none;">
              <span class="themeDot" aria-hidden="true"></span>
              <span id="themeName">테마</span>
            </div>

            <p class="question" id="questionText" style="display:none;"></p>

            <div class="idle" id="idleBox">
              <h2>대화를 시작해볼까요?</h2>
              <p>
                “다음”을 누를 때마다 <strong>질문 한 장</strong>이 나옵니다.<br/>
              </p>
<h2 class="ruleTitle">오늘의 대화 룰: 가볍게, 예쁘게</h2>

  <ul class="ruleList">
    <li><strong>패스는 매너입니다.</strong> 부담은 내려놓으셔도 됩니다.</li>
    <li><strong>조언은 선물인데요,</strong> 오늘은 일단 포장만 해둘게요.</li>
    <li><strong>한 번에 짧게:</strong> 길면 다음 사람이 숨이 찹니다.</li>
    <li><strong>비밀은 그대로:</strong> 여기서 들은 이야기는 여기서만.</li>
    <li><strong>정답 없음:</strong> “그냥 그렇습니다”도 훌륭한 답입니다.</li>
  </ul>
              <div style="margin-top:10px;">
                <button class="btn primary" id="btnStart" type="button">시작</button>
              </div>
            </div>
          </div>

          <div class="actions" aria-label="컨트롤">
            <button class="btn" id="btnNext" type="button" disabled>다음</button>
            <div class="btnRowRight">
              <button class="btn" id="btnDone" type="button" disabled>완료</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>

<script>
/* =========================================================
  - 12 테마 × 15 질문 = 180장
  - 질문 톤: 존칭(부드러운 대화용) + 가벼운 위트는 유지(과하지 않게)
  - 카드 상단 우측: 테마 표기
  - 반복 완화: 덱(셔플) + 덱 재생성 시 최근 N장 회피
========================================================= */

/* ===== 12 THEME PALETTES ===== */
const THEME_STYLE = {
  ice:     { label:"가볍게 인사",  bgA:"#fff7fb", bgB:"#f7f2ff", bgC:"#f3fbff", accent:"#ec4899" },
  taste:   { label:"취향·감각",    bgA:"#fff7ed", bgB:"#fff4e6", bgC:"#fff7fb", accent:"#fb7185" },
  lately:  { label:"요즘 뭐하나요", bgA:"#f3fff9", bgB:"#effaf8", bgC:"#f2fbff", accent:"#06b6d4" },
  memory:  { label:"기억 한 조각",  bgA:"#fdf4ff", bgB:"#f5f3ff", bgC:"#fff7ed", accent:"#8b5cf6" },
  talk:    { label:"대화 습관",     bgA:"#f3fbff", bgB:"#eef6ff", bgC:"#f4fffd", accent:"#2563eb" },
  work:    { label:"일·성장",       bgA:"#f4fff6", bgB:"#effdf5", bgC:"#f5fbff", accent:"#10b981" },
  recharge:{ label:"충전·회복",     bgA:"#f0f9ff", bgB:"#e0f2fe", bgC:"#f5fbff", accent:"#0ea5e9" },
  value:   { label:"가치·기준",     bgA:"#fff7ed", bgB:"#fff1f2", bgC:"#fff7fb", accent:"#f97316" },
  courage: { label:"용기·도전",     bgA:"#fefce8", bgB:"#fff7ed", bgC:"#fff1f2", accent:"#eab308" },
  tmi:     { label:"인간미(TMI)",   bgA:"#f3fbff", bgB:"#fff7fb", bgC:"#f3fff9", accent:"#22c55e" },
  future:  { label:"미래 상상",     bgA:"#f5f3ff", bgB:"#fdf4ff", bgC:"#f3fbff", accent:"#a855f7" },
  kind:    { label:"서로에게 따뜻", bgA:"#fff7ed", bgB:"#fff7fb", bgC:"#fdf2f8", accent:"#fb7185" },
};

/* ===== 180 CARDS (12×15) - 존칭 톤 ===== */
const CARDS = [
  // 1) ice 15
  ...[
    "오늘 기분을 이모지 하나로만 표현하신다면, 어떤 이모지일까요?",
    "요즘 하루를 살짝 살려주는 ‘소확행’이 있으실까요?",
    "최근에 ‘오늘 좀 괜찮았는데요?’ 싶었던 순간이 있으셨나요?",
    "오늘 스스로에게 칭찬 한 줄만 해주신다면, 어떤 말이 떠오르실까요?",
    "요즘 시간 순삭하게 만드는 것이 있으신가요? (영상/책/게임/사람, 다 가능합니다)",
    "요즘 자주 듣는 노래나 장르가 있으실까요?",
    "최근에 가장 자주 하신 말(또는 생각) 1위는 무엇이었나요?",
    "오늘 컨디션을 날씨로 비유하신다면 어떤 날씨에 가까우실까요?",
    "요즘 가장 자주 가시는 장소 TOP1은 어디인가요?",
    "지금 당장 ‘커피 한 잔’ 같이 하고 싶은 분이 떠오르신다면 누구실까요?",
    "요즘 ‘이건 좀 웃기다’ 하고 혼자 빵 터진 순간이 있으셨나요?",
    "최근에 새로 알게 된 소소한 팁(생활꿀팁)이 있다면 무엇인가요?",
    "오늘 하루에 제목을 붙인다면 어떤 제목이 어울릴까요?",
    "지금 기분에 가장 어울리는 색 하나만 고르신다면 무엇일까요?",
    "요즘 ‘이건 꼭 챙긴다’ 싶은 작은 루틴이 있으실까요?"
  ].map((t,i)=>({ id:`ice_${i+1}`, theme:"ice", text:t })),

  // 2) taste 15
  ...[
    "평생 간식 하나만 고르셔야 한다면 무엇을 고르시겠어요?",
    "힘드실 때 자동으로 찾게 되는 맛은 어떤 쪽이신가요? (매운/달달/짭짤/고소)",
    "향(향수/샴푸/캔들) 중에서 ‘이건 반칙입니다’ 싶은 최애가 있으실까요?",
    "색 조합 하나만 고르신다면 어떤 조합을 좋아하시나요? (예: 크림+베이지)",
    "요즘 알고리즘을 지배한 콘텐츠 취향은 어떤 쪽인가요?",

    "여행 가시면 꼭 드시는 ‘그 지역의 그것’이 있으신가요?",
    "옷을 고르실 때 기준 1순위는 무엇인가요? (핏/소재/색/가격/브랜드)",
    "요즘 기분 버튼 같은 장소가 있다면 어디인가요?",

    "‘이 맛은 나를 배신하지 않습니다’ 같은 메뉴가 있다면 무엇인가요?"
  ].map((t,i)=>({ id:`taste_${i+1}`, theme:"taste", text:t })),

  // 3) lately 15
  ...[
    "요즘 가장 자주 드는 생각을 한 문장으로 줄인다면 무엇일까요?",
    "요즘 바쁘신가요, 아니면 바쁜 척이 더 바쁘신가요? (둘 다 가능하십니다)",
    "요즘 ‘이건 진짜 배우고 싶습니다’ 싶은 것이 있으실까요?",
    "최근 생활을 조금이라도 편하게 만든 것이 있다면 무엇인가요?",
    "요즘 스스로에게 가장 많이 하시는 말이 있다면 무엇인가요?",
    "요즘 ‘아, 이게 제 스타일이네요’ 하고 느끼는 순간이 있으신가요?",
    "최근 마음이 반응한 이슈/주제가 있다면 하나만 꼽아주실까요?",
    "잠들기 전에 제일 먼저 하시는 행동이 있으신가요?",
    "요즘 에너지를 훔쳐 가는 1순위는 무엇인가요?",

    "요즘 나에게 가장 필요한 한 가지를 고르신다면 무엇일까요?"
  ].map((t,i)=>({ id:`lately_${i+1}`, theme:"lately", text:t })),

  // 4) memory 15
  ...[
    "인생에 좋은 방향으로 남아 있는 한마디가 있으실까요?",
    "예전의 나에게 조언 한 줄을 선물하신다면 어떤 말이 좋을까요?",

    "스스로를 조금 단단하게 만든 경험이 있다면 무엇이었나요?",
    "어릴 때 좋아했던 것 중 지금도 좋아하는 것이 있으신가요?",
    "최근 ‘아, 제가 성장했네요’ 싶었던 순간이 있으셨나요?",
    "좋아하시는 기억의 계절은 언제인가요? (봄/여름/가을/겨울)",
    "성격을 설명하는 에피소드 하나만 고르신다면 무엇인가요?",
    "최근 다시 꺼내 본 추억(사진/노래/장소)이 있으실까요?",
    "인생의 한 장면으로 남길 사진이 있다면 어떤 사진인가요?",
    "‘이때로 딱 하루만’ 돌아갈 수 있다면 언제로 가고 싶으신가요?",

const $ = (id)=>document.getElementById(id);
const questionText = $("questionText");
const themeBadge = $("themeBadge");
const themeName = $("themeName");
const progress = $("progress");
const total = $("total");
const idleBox = $("idleBox");
const btnStart = $("btnStart");
const btnNext = $("btnNext");
const btnDone = $("btnDone");

total.textContent = String(CARDS.length);

/* ===== Deck (반복 완화) ===== */
let deck = [];
let index = 0;
let recent = [];
const recentWindow = 12; // 최근 12장 회피(덱 재생성 시)

function shuffleInPlace(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeckAvoidingRecent(){
  const base = CARDS.slice();
  shuffleInPlace(base);

  for(let tries=0; tries<7; tries++){
    const head = base.slice(0, Math.min(recentWindow, base.length)).map(c=>c.id);
    const overlap = head.filter(id=>recent.includes(id)).length;
    if(overlap <= 1) break; // 0이 이상적이지만 덱 크기/최근상황 고려해 1까지 허용
    shuffleInPlace(base);
  }
  return base;
}

function applyTheme(themeKey){
  const t = THEME_STYLE[themeKey] || THEME_STYLE.ice;
  document.documentElement.style.setProperty("--bgA", t.bgA);
  document.documentElement.style.setProperty("--bgB", t.bgB);
  document.documentElement.style.setProperty("--bgC", t.bgC);
  document.documentElement.style.setProperty("--accent", t.accent);
  themeName.textContent = t.label;
}

function showCard(card){
  applyTheme(card.theme);
  themeBadge.style.display = "";
  questionText.textContent = card.text;
  progress.textContent = String(Math.min(index, deck.length));
}

function startSession(){
  recent = [];
  deck = buildDeckAvoidingRecent();
  index = 0;

  idleBox.style.display = "none";
  questionText.style.display = "";
  btnNext.disabled = false;
  btnDone.disabled = false;

  nextCard();
}

function nextCard(){
  if(index >= deck.length){
    deck = buildDeckAvoidingRecent();
    index = 0;
  }

  const card = deck[index];
  index += 1;

  recent.push(card.id);
  if(recent.length > recentWindow) recent = recent.slice(-recentWindow);

  showCard(card);
}

function endSession(){
  deck = [];
  index = 0;
  recent = [];

  themeBadge.style.display = "none";
  questionText.textContent = "";
  questionText.style.display = "none";
  idleBox.style.display = "";
  btnNext.disabled = true;
  btnDone.disabled = true;
  progress.textContent = "0";

  applyTheme("ice");
}

btnStart.addEventListener("click", startSession);
btnNext.addEventListener("click", nextCard);
btnDone.addEventListener("click", endSession);

// Keyboard: Space/Enter = Next, Esc = Done
document.addEventListener("keydown",(e)=>{
  if(btnNext.disabled) return;
  if(e.key === "Escape"){
    endSession();
  }else if(e.key === " " || e.key === "Enter"){
    e.preventDefault();
    nextCard();
  }
});
</script>
