if('scrollRestoration'in history)history.scrollRestoration='manual';
const STYLE=['먼저 들어주기','천천히 질문','짧게 정리해주기','중간에 멈춰주기','비교하지 않기','조언은 나중에','가볍게 시작','침묵도 괜찮게'];
const MOOD=['분주함','답답함','피곤함','기대','흔들림','외로움','괜찮음','모르겠음'];
const $=s=>document.querySelector(s),$$=s=>Array.from(document.querySelectorAll(s));
let step=1,tap=0,timer=null;
function topNow(){try{scrollTo({top:0,left:0,behavior:'instant'})}catch(e){scrollTo(0,0)}document.documentElement.scrollTop=0;document.body.scrollTop=0}
function stabilize(){topNow();requestAnimationFrame(topNow);setTimeout(topNow,0);setTimeout(topNow,80)}
function read(){try{let cur=localStorage.getItem(STORE);if(cur)return JSON.parse(cur)||{};for(const k of LEGACY){let v=localStorage.getItem(k);if(v)return JSON.parse(v)||{}}}catch(e){}return{}}
function write(s){localStorage.setItem(STORE,JSON.stringify(s))}
function esc(v){return String(v||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function join(v,f){return v&&v.length?v.join(', '):f}function text(v,f){return v&&String(v).trim()?String(v).trim():f}
function doorCode(){const s=read();return s.door&&DOORS[s.door]?s.door:'K'}function door(){return DOORS[doorCode()]||DOORS.K}
function setStep(n,push=true){save(false);step=Math.max(1,Math.min(7,n));if(document.activeElement&&document.activeElement.blur)document.activeElement.blur();sessionStorage.setItem(RESET,'1');if(push)history.pushState(null,'','#'+step);render();stabilize()}
function restoreStep(){const q=new URLSearchParams(location.search);const qs=parseInt(q.get('step')||'',10);const hs=parseInt(location.hash.replace('#','')||'',10);step=qs||hs||1}
function coachOn(){const s=read();s.coachMode=true;write(s);document.body.classList.add('coach-mode');$('#coachToggle').textContent='고객 보기'}
function toggleCoach(){const s=read();document.body.classList.toggle('coach-mode');s.coachMode=document.body.classList.contains('coach-mode');write(s);$('#coachToggle').textContent=s.coachMode?'고객 보기':'코치 보기'}
function tapCoach(){tap++;clearTimeout(timer);timer=setTimeout(()=>tap=0,900);if(tap>=5){toggleCoach();tap=0}}
function chip(items,g){return items.map(x=>`<button type="button" class="chip" data-group="${g}">${esc(x)}</button>`).join('')}
function active(g){return $$(`[data-group="${g}"].active`).map(x=>x.textContent.trim())}
function restoreGroup(g,vals){if(!vals)return;$$(`[data-group="${g}"]`).forEach(b=>{if(vals.includes(b.textContent.trim()))b.classList.add('active')})}
function saveField(id,key,s){const el=$('#'+id);if(el)s[key]=el.value.trim()}function loadField(id,key,s){const el=$('#'+id);if(el&&s[key])el.value=s[key]}
function save(){const s=read();if(step===1){saveField('alias','alias',s);s.depth=active('depth')}if(step===2){s.mood=active('mood');saveField('moodNote','moodNote',s)}if(step===3){s.scene=active('scene');saveField('sceneNote','sceneNote',s)}if(step===4){s.seed=active('seed');saveField('seedNote','seedNote',s)}if(step===5){s.style=active('style');saveField('avoid','avoid',s)}if(step===6){s.ready=active('ready');saveField('beforeStart','beforeStart',s)}if(step===7){saveField('opening','opening',s)}write(s)}
function currentOpening(){const s=read(),d=door();return text(s.opening,d.open[0]||'이 이야기를 천천히 꺼내보고 싶어요.')}
function coachPanel(kind){const d=door();const roles=['고객이 코칭세션의 문턱에 자연스럽게 들어오도록 돕습니다.','현재 마음의 신호를 가볍게 확인합니다.','본 코칭세션으로 가져갈 장면의 입구를 엽니다.','함께 볼 씨앗을 남깁니다. 목표나 해결책을 정하지 않습니다.','본 코칭세션을 시작할 대화 방식을 맞춥니다.','카드와 본 세션 사이의 마지막 문턱입니다.','요약이 아니라 본 코칭세션 진입 카드입니다.'];
const ments=['가볍게 골라도 괜찮아요. 지금 가까운 말 하나면 충분해요.','정확히 고르지 않아도 됩니다. 오늘 조금 가까운 느낌만 하나 짚어볼게요.','큰 사건이 아니어도 됩니다. 스친 장면 하나면 충분해요.','해결하지 않아도 됩니다. 오늘 같이 봐도 좋을 단어 하나만 남겨볼게요.','이제 바로 이어질 대화를 어떤 방식으로 시작하면 편할지 골라주세요.','지금 바로 이어가도 괜찮은지 말할 수 있는 만큼만 확인할게요.','이 문장으로 들어갑니다. 이제 카드는 닫고 이 문장으로 코칭을 시작합니다.'];
const next=['그럼 이 말을 마음 한쪽에 두고 요즘 마음의 신호를 확인해보겠습니다.','이 느낌을 잠깐 기억해두고 떠오르는 장면 하나를 꺼내보겠습니다.','이 장면에서 오늘 함께 보고 싶은 작은 단서 하나를 남겨보겠습니다.','이 씨앗을 들고 들어갈 때 어떤 방식이면 편한지 맞춰보겠습니다.','방식은 확인했습니다. 이제 이어갈 준비가 어느 정도인지 확인하겠습니다.','마지막으로 이 대화를 시작할 문장 하나만 고르고 바로 코칭으로 들어가겠습니다.','다음 카드는 없습니다. 버튼을 누르면 즉시 본 코칭세션으로 들어갑니다.'];
return `<details class="coach-panel coach-only" open><summary>코치 전용 보기</summary><div class="coach-body"><b>이 장의 역할</b><p>${roles[step-1]}</p><div class="coach-note"><b>고객에게 건넬 짧은 멘트</b><br>“${ments[step-1]}”</div><b>코치가 들어야 할 신호</b><ul>${d.listen.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><b>피해야 할 개입</b><ul>${d.avoid.map(x=>`<li>${esc(x)}</li>`).join('')}</ul><b>고객 답변이 짧을 때 반응</b><p>“좋습니다. 지금은 짧게 두어도 충분합니다. 이 말만 잠깐 붙잡고 이어가겠습니다.”</p><div class="coach-note"><b>다음 카드로 넘기는 연결문</b><br>${next[step-1]}</div><div class="coach-note"><b>즉시 코칭세션으로 들어갈 때의 브릿지</b><br>${esc(d.bridge)}</div><div class="coach-tools"><b>현장 도구</b><div class="mini-actions"><button type="button" class="coach-action" onclick="copyCoachPrompt()">코치 메모 복사</button><button type="button" class="coach-action warn" onclick="resetConversation()">새 고객으로 비우기</button></div><p>같은 기기로 여러 고객을 만날 때는 시작 전 기록을 비우세요.</p></div></div></details>`}
function render(){const s=read(),d=door();document.documentElement.style.setProperty('--gold',d.color);$('.mark').textContent=doorCode();$('#doorLetter').textContent=doorCode();$('#doorName').textContent=d.word;$('#doorTone').textContent=d.customer;$('#doorMini').style.display=step===1?'none':'flex';$('#progress').innerHTML=Array.from({length:7},(_,i)=>`<i class="${i<step?'on':''}"></i>`).join('');
let body='';const head=(k,h,sub,sym)=>`<div class="kicker"><span>${k}</span><span>${step} / 7</span></div><div class="ritual-symbol">${sym}</div><h1>${h}</h1><p class="sub">${sub}</p>`;
if(step===1)body=head('01 · 문 고르기','오늘, 하나의 문을 열어볼까요?','가볍게 골라도 괜찮아요. 지금 가까운 말 하나면 충분해요.','문')+`<label class="section-label">오늘 열어볼 문</label><div class="door-grid">${Object.entries(DOORS).map(([k,v])=>`<button type="button" class="door-btn ${k===doorCode()?'active':''}" data-door="${k}"><strong><span class="door-code">${k}</span>${esc(v.word)}</strong><em>${esc(v.customer)}</em><small>${esc(v.tag)}</small></button>`).join('')}</div><label class="section-label">오늘의 속도</label><div class="chips">${chip(['가볍게','천천히','조금 진지하게','아직 모르겠음'],'depth')}</div><label class="section-label" for="alias">불러주면 편한 이름</label><input id="alias" placeholder="예: 민준, J, 오늘의 나">`;
if(step===2)body=head('02 · 마음 신호','오늘 마음의 날씨','좋고 나쁨보다, 지금 가까운 느낌 하나.','신호')+`<label class="section-label">지금 가까운 느낌</label><div class="chips">${chip(MOOD,'mood')}</div><label class="section-label" for="moodNote">한 줄로 더하면</label><textarea id="moodNote" placeholder="예: 조금 분주하지만 말해보고 싶어요"></textarea>`;
if(step===3)body=head('03 · 장면 하나','마음에 남은 장면','크지 않아도 괜찮아요. 스친 장면이면 충분해요.','장면')+`<div class="quote-line">${esc(d.sceneQuestion)}</div><label class="section-label">떠오르는 장면</label><div class="chips">${chip(d.scene,'scene')}</div><textarea id="sceneNote" placeholder="예: 아침에 잠깐 멈칫했던 장면"></textarea>`;
if(step===4)body=head('04 · 씨앗','놓치고 싶지 않은 말','함께 볼 작은 씨앗 하나.','씨앗')+`<label class="section-label">함께 볼 씨앗</label><div class="chips">${chip(d.seed,'seed')}</div><textarea id="seedNote" placeholder="예: 내 기준을 다시 잡고 싶어요"></textarea>`;
if(step===5)body=head('05 · 방식','어떤 방식이 편해요?','바로 이어질 코칭의 속도를 먼저 맞춰요.','방식')+`<label class="section-label">시작 방식</label><div class="chips">${chip(STYLE,'style')}</div><textarea id="avoid" placeholder="예: 조언보다 먼저 들어주세요"></textarea>`;
if(step===6)body=head('06 · 바로 전','시작 전, 잠깐','말할 수 있는 만큼만 가지고 들어가요.','준비')+`<label class="section-label">지금 이어갈 준비</label><div class="chips">${chip(['지금 바로','한 문장부터','코치가 먼저 물어봐줘요','조금 천천히','잠깐 숨 고르기','아직 조심스럽게'],'ready')}</div><div class="breath-card"><b>안내</b><span>다음 장에서 시작 문장을 고르면 바로 코칭대화로 이어져요.</span></div><textarea id="beforeStart" placeholder="예: 천천히 물어봐주세요"></textarea>`;
if(step===7){const rows=[['열어볼 말',d.word],['마음 신호',text(s.moodNote,join(s.mood,'천천히 확인하기'))],['떠오른 장면',text(s.sceneNote,join(s.scene,'장면부터 꺼내기'))],['함께 볼 씨앗',text(s.seedNote,join(s.seed,'함께 찾아보기'))],['시작 방식',text(s.avoid,join(s.style,'내 속도에 맞춰 말하기'))],['준비 상태',text(s.beforeStart,join(s.ready,'지금 이어가기'))],['시작 문장',currentOpening()]];body=head('07 · 시작 문장','이 문장으로 들어갑니다','이제 카드는 닫고, 이 문장으로 코칭을 시작합니다.','시작')+`<div class="soft-card"><b>오늘의 시작 문장</b><p id="firstOpening">${esc(currentOpening())}</p></div><label class="section-label">시작 문장 고르기</label><div class="chips">${chip(d.open,'openingPick')}</div><textarea id="opening" placeholder="예: 지금 이 이야기부터 시작하고 싶어요"></textarea><div class="ticket">${rows.map(r=>`<div class="ticket-row"><small>${esc(r[0])}</small><div>${esc(r[1])}</div></div>`).join('')}</div><textarea id="copyText" class="copybox">${esc(rows.map(r=>`${r[0]}: ${r[1]}`).join('\n'))}</textarea><div class="handoff" id="handoff"><strong>이 문장으로 코칭을 시작합니다.</strong><p>좋아요. 여기까지는 문을 여는 시간이었습니다. 지금부터는 이 문장 하나를 붙잡고 코칭을 시작해볼게요.</p><div class="quote-line">“${esc(currentOpening())}”\n\n이 문장부터 천천히 들어볼게요. 이 말에서 가장 먼저 함께 보고 싶은 부분은 어디인가요?</div></div>`}
$('#card').innerHTML=body+coachPanel();restoreInputs();bindStep();$('#nav').className='nav'+(step===1?' solo':'');$('#nav').innerHTML=step===1?'<button class="btn primary" type="button" onclick="setStep(2)">이 문으로 들어가기</button>':step===7?'<button class="btn ghost" type="button" onclick="copySummary()">복사</button><button class="btn primary" type="button" onclick="startSession()">이 문장으로 시작하기</button>':`<button class="btn ghost" type="button" onclick="setStep(${step-1})">다시 보기</button><button class="btn primary" type="button" onclick="setStep(${step+1})">다음</button>`;}
function restoreInputs(){const s=read();loadField('alias','alias',s);restoreGroup('depth',s.depth);loadField('moodNote','moodNote',s);restoreGroup('mood',s.mood);loadField('sceneNote','sceneNote',s);restoreGroup('scene',s.scene);loadField('seedNote','seedNote',s);restoreGroup('seed',s.seed);loadField('avoid','avoid',s);restoreGroup('style',s.style);loadField('beforeStart','beforeStart',s);restoreGroup('ready',s.ready);loadField('opening','opening',s)}
function bindStep(){$$('[data-door]').forEach(b=>b.onclick=()=>{const s=read();s.door=b.dataset.door;write(s);render()});$$('[data-group]').forEach(b=>b.onclick=()=>{if(b.dataset.group==='openingPick'){$$('[data-group="openingPick"]').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#opening').value=b.textContent.trim()}else b.classList.toggle('active');save();render()});$$('input,textarea').forEach(el=>el.oninput=()=>save())}
function buildCoachPrompt(){save();const s=read(),d=door(),op=currentOpening();return ['KINGDOM 초대카드 v10 현장 메모',`선택한 문: ${d.word} (${d.name})`,`마음 신호: ${text(s.moodNote,join(s.mood,'미선택'))}`,`떠오른 장면: ${text(s.sceneNote,join(s.scene,'미선택'))}`,`함께 볼 씨앗: ${text(s.seedNote,join(s.seed,'미선택'))}`,`시작 방식: ${text(s.avoid,join(s.style,'내 속도에 맞춰 말하기'))}`,`준비 상태: ${text(s.beforeStart,join(s.ready,'미선택'))}`,`시작 문장: ${op}`,'',`코치 시작문: “${op}” 이 문장부터 천천히 들어볼게요. 이 말에서 가장 먼저 함께 보고 싶은 부분은 어디인가요?`].join('\n')}
async function copyCoachPrompt(){const txt=buildCoachPrompt();try{await navigator.clipboard.writeText(txt);toast('코치 메모를 복사했어요')}catch(e){toast('복사를 지원하지 않아요')}}
async function copySummary(){save();const txt=$('#copyText')?.value||buildCoachPrompt();try{await navigator.clipboard.writeText(txt);toast('복사했어요')}catch(e){toast('복사를 지원하지 않아요')}}
function resetConversation(){if(!confirm('현재 고객의 카드 기록을 비우고 새 고객으로 시작할까요?'))return;try{[STORE,...LEGACY,'kingdom.invitation.softritual.v6','kingdom.invitation.customerfirst.v3','kingdom.invitation.immediate.v4'].forEach(k=>localStorage.removeItem(k))}catch(e){}toast('새 고객으로 비웠어요');setTimeout(()=>{location.href=location.pathname+(document.body.classList.contains('coach-mode')?'?coach=1':'')},350)}
function startSession(){save();render();$('#handoff')?.classList.add('show');$('#handoff')?.scrollIntoView({behavior:'smooth',block:'center'});toast('이 문장으로 시작합니다')}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}
window.addEventListener('pageshow',stabilize);window.addEventListener('popstate',()=>{restoreStep();render();stabilize()});window.addEventListener('beforeunload',()=>save());
document.addEventListener('DOMContentLoaded',()=>{restoreStep();const p=new URLSearchParams(location.search);const s=read();if(p.get('coach')==='1'||s.coachMode)document.body.classList.add('coach-mode');$('#coachToggle').textContent=document.body.classList.contains('coach-mode')?'고객 보기':'코치 보기';$('#coachToggle').onclick=toggleCoach;$('.mark').onclick=tapCoach;$('.change-door').onclick=e=>{e.preventDefault();setStep(1)};render();stabilize()});
</script>
</body>
</html>
