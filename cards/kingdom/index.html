<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KINGDOM 대화카드 v5 | DAILYCOACHING</title>
  <meta name="description" content="코치가이드 v5가 강화된 KINGDOM 7단계 초대카드" />
  <meta name="theme-color" content="#111827" />
  <style>
    :root {
      --bg: #f7f0e5;
      --paper: #fffdfa;
      --ink: #171717;
      --muted: #6f685f;
      --line: #e3d7c8;
      --deep: #111827;
      --gold: #c69a50;
      --accent: #6d5dfc;
      --accent-soft: rgba(109, 93, 252, .11);
      --shadow: 0 18px 48px rgba(20, 18, 16, .12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(160deg, rgba(17,24,39,.96) 0, rgba(17,24,39,.96) 300px, transparent 300px),
        radial-gradient(circle at 100% 0, rgba(198,154,80,.18), transparent 24rem),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .app { width: min(1060px, calc(100% - 28px)); margin: 0 auto; padding: 18px 0 110px; }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      padding: 4px 0 20px;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      background: linear-gradient(145deg, var(--gold), #f1d48f);
      color: #111827;
      font-weight: 950;
      font-size: 1.2rem;
    }
    .brand b { display: block; font-size: 1rem; letter-spacing: .08em; }
    .brand span { display: block; margin-top: 3px; color: rgba(255,255,255,.70); font-size: .82rem; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill {
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      color: #fff;
      background: rgba(255,255,255,.08);
      font-weight: 850;
      font-size: .86rem;
    }
    .progress { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 0 0 14px; }
    .progress i { height: 6px; border-radius: 999px; background: rgba(255,255,255,.24); }
    .progress i.on { background: var(--accent); }
    .shell { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 18px; align-items: start; }
    .panel, .side, .nav { border: 1px solid var(--line); border-radius: 8px; background: rgba(255,253,250,.96); box-shadow: var(--shadow); }
    .panel { min-height: 560px; padding: clamp(20px, 4vw, 34px); }
    .side { position: sticky; top: 18px; padding: 18px; display: grid; gap: 12px; }
    .kicker { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--accent); font-size: .82rem; font-weight: 950; }
    h1 { margin: 12px 0 10px; font-size: clamp(2rem, 5vw, 4rem); line-height: 1.04; word-break: keep-all; }
    .lead { margin: 0 0 22px; max-width: 46rem; color: var(--muted); font-size: 1.02rem; line-height: 1.7; word-break: keep-all; }
    .section-label { display: block; margin: 20px 0 9px; color: #352f28; font-size: .9rem; font-weight: 950; }
    .door-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .door {
      min-height: 114px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: left;
    }
    .door.active { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .door strong { display: flex; align-items: center; gap: 8px; font-size: 1.05rem; }
    .code { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 7px; color: #fff; background: var(--accent); font-weight: 950; }
    .door em { display: block; margin-top: 9px; color: var(--muted); font-style: normal; font-size: .9rem; line-height: 1.45; }
    .door small { display: inline-block; margin-top: 10px; color: var(--accent); font-weight: 900; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffaf3;
      color: #342f2a;
      font-weight: 850;
    }
    .chip.active { color: #fff; background: var(--deep); border-color: var(--deep); }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 13px 14px;
      font-size: 1rem;
      line-height: 1.55;
      outline: none;
    }
    textarea { min-height: 130px; resize: vertical; }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .soft {
      margin: 14px 0 0;
      padding: 14px;
      border: 1px solid rgba(0,0,0,.05);
      border-radius: 8px;
      background: var(--accent-soft);
      color: #3c352e;
      line-height: 1.62;
      word-break: keep-all;
    }
    .summary { display: grid; gap: 9px; }
    .summary-row { padding: 11px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .summary-row small { display: block; margin-bottom: 4px; color: var(--accent); font-weight: 950; }
    .summary-row div { color: #342f2a; font-size: .94rem; line-height: 1.5; white-space: pre-wrap; }
    .door-badge { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .door-badge .code { flex: 0 0 auto; width: 38px; height: 38px; font-size: 1.2rem; }
    .door-badge b { display: block; }
    .door-badge span { display: block; margin-top: 2px; color: var(--muted); font-size: .86rem; line-height: 1.35; }
    .coach { display: none; padding: 13px; border: 1px dashed rgba(17,24,39,.24); border-radius: 8px; background: #fff; color: var(--muted); font-size: .91rem; line-height: 1.62; }
    body.coach-on .coach { display: block; }
    .coach b { color: #2d2722; }
    .coach ul { margin: 8px 0 0; padding-left: 18px; }

    .coach-title { color: #2d2722; font-weight: 950; font-size: 1rem; }
    .coach-section { padding-top: 10px; border-top: 1px solid rgba(17,24,39,.10); }
    .coach-section:first-child { padding-top: 0; border-top: 0; }
    .coach-section h4 { margin: 0 0 7px; color: #2d2722; font-size: .9rem; }
    .coach-section p { margin: 0 0 9px; }
    .coach-note { margin: 8px 0; padding: 10px 11px; border-left: 4px solid var(--accent); border-radius: 8px; background: var(--accent-soft); color: #3c352e; }
    .coach-grid { display: grid; gap: 9px; }
    .coach-mini { padding: 10px; border: 1px solid var(--line); border-radius: 8px; background: #fffdfa; }
    .coach-mini b { display: block; margin-bottom: 5px; }
    .nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      transform: translateX(-50%);
      width: min(1060px, 100% - 20px);
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: 8px;
      padding: 10px;
      margin-bottom: calc(10px + env(safe-area-inset-bottom));
      background: rgba(255,253,250,.92);
      backdrop-filter: blur(18px);
    }
    .nav button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      font-weight: 950;
    }
    .nav .primary { color: #fff; background: var(--deep); }
    .nav .secondary { color: #312a23; background: #eee3d5; }
    .nav .ghost { color: #312a23; background: #fff; border: 1px solid var(--line); }
    .copybox { position: absolute; left: -9999px; opacity: 0; }
    .toast { position: fixed; left: 50%; bottom: 84px; z-index: 30; transform: translateX(-50%); padding: 10px 14px; border-radius: 999px; color: #fff; background: var(--deep); opacity: 0; pointer-events: none; transition: opacity .16s ease; }
    .toast.show { opacity: 1; }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; }
      .panel { min-height: auto; }
    }
    @media (max-width: 560px) {
      .app { width: min(100% - 20px, 1060px); padding-top: 12px; }
      .top { align-items: flex-start; }
      .brand span { display: none; }
      .door-grid { grid-template-columns: 1fr; }
      .nav { grid-template-columns: 1fr 1fr; }
      .nav .ghost { grid-column: 1 / -1; order: 3; }
    }
  </style>
</head>

      if (step === 3) return `<label class="section-label">오늘의 세션 씨앗</label><div class="chips">${chipHtml('seed', d.seeds)}</div><label class="section-label" for="seedNote">가장 다뤄보고 싶은 한 가지</label><textarea id="seedNote" placeholder="오늘 이 대화에서 보고 싶은 것을 적어보세요.">${esc(state.seedNote)}</textarea>`;
      if (step === 4) return `<label class="section-label">대화가 열리는 방식</label><div class="chips">${chipHtml('style', styles)}</div><label class="section-label" for="avoidNote">피하고 싶은 방식</label><textarea id="avoidNote" placeholder="조언이 빠르면 부담스럽다, 비교는 피하고 싶다처럼 적어보세요.">${esc(state.avoidNote)}</textarea>`;
      if (step === 5) return `<div class="soft"><b>브릿지</b><br>좋아요. 지금은 “${esc(d.word)}” 문으로 들어왔고, 이 대화는 ${esc(d.tag)}을 중심으로 천천히 시작할 수 있습니다.</div><label class="section-label">시작 전 필요한 것</label><div class="chips">${chipHtml('ready', ready)}</div><label class="section-label" for="beforeStart">코치가 먼저 알아두면 좋은 것</label><textarea id="beforeStart" placeholder="말하기 전에 필요한 안전감이나 요청을 적어보세요.">${esc(state.beforeStart)}</textarea>`;
      return `<label class="section-label">시작 문장 선택</label><div class="chips">${d.openings.map(item => `<button class="chip ${state.opening === item ? 'active' : ''}" type="button" data-opening="${esc(item)}">${esc(item)}</button>`).join('')}</div><label class="section-label" for="opening">내 시작 문장</label><textarea id="opening">${esc(text(state.opening, d.openings[0]))}</textarea><div class="soft"><b>코칭 시작</b><br>${esc(text(state.opening, d.openings[0]))}</div>`;
    }

    function renderSide(){
      const d = door();
      document.getElementById('sideCode').textContent = d.code;
      document.getElementById('sideTitle').textContent = d.word;
      document.getElementById('sideTone').textContent = d.tone;
      const rows = [
        ['선택한 문', `${d.code} · ${d.word}`],
        ['말할 깊이', list(state.depth)],
        ['오늘의 신호', list(state.mood)],
        ['장면', text(state.sceneNote, list(state.scene))],
        ['세션 씨앗', text(state.seedNote, list(state.seed))],
        ['시작 방식', list(state.style)],
        ['시작 문장', text(state.opening, d.openings[0])]
      ];
      document.getElementById('summary').innerHTML = rows.map(([key, value]) => `<div class="summary-row"><small>${esc(key)}</small><div>${esc(value)}</div></div>`).join('');
      const guide = pageGuides[step] || pageGuides[0];
      const doorGuide = doorGuides[d.code] || { purpose: d.coach, listen: [], avoid: [], bridge: d.coach };
      const listItems = (items) => items.map(item => `<li>${esc(item)}</li>`).join('');
      document.getElementById('coachBox').innerHTML = [
        '<div class="coach-title">코치 전용 보기 · v5</div>',
        '<div class="coach-section"><h4>이 장의 역할</h4><p>' + esc(guide.role) + '</p><div class="coach-note"><b>진행 멘트</b><br>' + esc(guide.line) + '</div></div>',
        '<div class="coach-section"><h4>코치의 태도</h4><ul>' + listItems(guide.stance) + '</ul></div>',
        '<div class="coach-section"><h4>짧은 후속 질문</h4><ul>' + listItems(guide.questions) + '</ul><div class="coach-note"><b>답변이 짧거나 막힐 때</b><br>' + esc(guide.stuck) + '</div></div>',
        '<div class="coach-section coach-grid"><div class="coach-mini"><b>선택한 문에서 들을 것</b><ul>' + listItems(doorGuide.listen) + '</ul></div><div class="coach-mini"><b>피할 것</b><ul>' + listItems(doorGuide.avoid) + '</ul></div></div>',
        '<div class="coach-section"><h4>문별 코칭 목적</h4><p>' + esc(doorGuide.purpose) + '</p><div class="coach-note"><b>다음 연결</b><br>' + esc(guide.next) + '</div><div class="coach-note"><b>즉시 세션 브릿지</b><br>' + esc(doorGuide.bridge) + '</div></div>'
      ].join('');
      const copyRows = state.coach ? [...rows, ['코치 진행 멘트', guide.line], ['즉시 세션 브릿지', doorGuide.bridge]] : rows;
      document.getElementById('copyText').value = copyRows.map(([key, value]) => `${key}: ${value}`).join('\n');
    }

    function bindInputs(){
      ['alias','moodNote','sceneNote','seedNote','avoidNote','beforeStart','opening'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', () => { state[id] = el.value.trim(); if (id === 'opening') state.opening = el.value.trim(); save(); });
      });
    }

    document.addEventListener('click', event => {
      const doorButton = event.target.closest('[data-door]');
      if (doorButton) { state.door = doorButton.dataset.door; save(); render(); return; }
      const chip = event.target.closest('[data-chip]');
      if (chip) {
        const group = chip.dataset.chip;
        const value = chip.dataset.value;
        state[group] = state[group] || [];
        state[group] = state[group].includes(value) ? state[group].filter(item => item !== value) : [...state[group], value];
        save(); render(); return;
      }
      const opening = event.target.closest('[data-opening]');
      if (opening) { state.opening = opening.dataset.opening; save(); render(); }
    });
    document.getElementById('prevBtn').addEventListener('click', () => { if (step > 0) { step -= 1; location.hash = String(step); render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (step < 6) { step += 1; location.hash = String(step); render(); } else { copySummary(); } });
    document.getElementById('copyBtn').addEventListener('click', copySummary);
    document.getElementById('coachToggle').addEventListener('click', () => { state.coach = !state.coach; save(); render(); });
    let coachTapCount = 0;
    let coachTapTimer = null;
    document.getElementById('brandMark').addEventListener('click', () => {
      coachTapCount += 1;
      clearTimeout(coachTapTimer);
      coachTapTimer = setTimeout(() => { coachTapCount = 0; }, 900);
      if (coachTapCount >= 5) {
        state.coach = !state.coach;
        coachTapCount = 0;
        save();
        render();
        toast(state.coach ? '코치 모드를 켰습니다.' : '고객 보기로 전환했습니다.');
      }
    });
    document.getElementById('resetBtn').addEventListener('click', () => { if (!confirm('입력한 내용을 지우고 새로 시작할까요?')) return; state = { door:'K', coach: state.coach }; save(); step = 0; location.hash = '0'; render(); });
    window.addEventListener('hashchange', () => { step = Math.min(6, Math.max(0, Number(location.hash.replace('#','')) || 0)); render(); });

    async function copySummary(){
      renderSide();
      const text = document.getElementById('copyText').value;
      try { await navigator.clipboard.writeText(text); toast('요약을 복사했습니다.'); }
      catch (error) { const box = document.getElementById('copyText'); box.style.position = 'fixed'; box.style.left = '12px'; box.style.opacity = '1'; box.select(); toast('선택된 내용을 복사하세요.'); }
    }
    function toast(message){ const el = document.getElementById('toast'); el.textContent = message; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1400); }
    render();
  </script>
</body>
</html>
