<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>KINGDOM 대화카드 | DAILYCOACHING</title>
  <meta name="description" content="코칭 대화를 바로 시작하도록 돕는 KINGDOM 7단계 초대카드" />
  <meta name="theme-color" content="#111827" />
  <style>
    :root {
      --bg: #f7f0e5;
      --paper: #fffdfa;
      --ink: #171717;
      --muted: #6f685f;
      --line: #e3d7c8;
      --deep: #111827;
      --gold: #c69a50;
      --accent: #6d5dfc;
      --accent-soft: rgba(109, 93, 252, .11);
      --shadow: 0 18px 48px rgba(20, 18, 16, .12);
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(160deg, rgba(17,24,39,.96) 0, rgba(17,24,39,.96) 300px, transparent 300px),
        radial-gradient(circle at 100% 0, rgba(198,154,80,.18), transparent 24rem),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: 0;
    }
    button, input, textarea { font: inherit; }
    button { cursor: pointer; }
    a { color: inherit; text-decoration: none; }
    .app { width: min(1060px, calc(100% - 28px)); margin: 0 auto; padding: 18px 0 110px; }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      color: #fff;
      padding: 4px 0 20px;
    }
    .brand { display: flex; align-items: center; gap: 12px; min-width: 0; }
    .mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 8px;
      background: linear-gradient(145deg, var(--gold), #f1d48f);
      color: #111827;
      font-weight: 950;
      font-size: 1.2rem;
    }
    .brand b { display: block; font-size: 1rem; letter-spacing: .08em; }
    .brand span { display: block; margin-top: 3px; color: rgba(255,255,255,.70); font-size: .82rem; }
    .top-actions { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
    .pill {
      min-height: 38px;
      padding: 0 12px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      color: #fff;
      background: rgba(255,255,255,.08);
      font-weight: 850;
      font-size: .86rem;
    }
    .progress { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin: 0 0 14px; }
    .progress i { height: 6px; border-radius: 999px; background: rgba(255,255,255,.24); }
    .progress i.on { background: var(--accent); }
    .shell { display: grid; grid-template-columns: minmax(0, 1fr) 320px; gap: 18px; align-items: start; }
    .panel, .side, .nav { border: 1px solid var(--line); border-radius: 8px; background: rgba(255,253,250,.96); box-shadow: var(--shadow); }
    .panel { min-height: 560px; padding: clamp(20px, 4vw, 34px); }
    .side { position: sticky; top: 18px; padding: 18px; display: grid; gap: 12px; }
    .kicker { display: flex; align-items: center; justify-content: space-between; gap: 12px; color: var(--accent); font-size: .82rem; font-weight: 950; }
    h1 { margin: 12px 0 10px; font-size: clamp(2rem, 5vw, 4rem); line-height: 1.04; word-break: keep-all; }
    .lead { margin: 0 0 22px; max-width: 46rem; color: var(--muted); font-size: 1.02rem; line-height: 1.7; word-break: keep-all; }
    .section-label { display: block; margin: 20px 0 9px; color: #352f28; font-size: .9rem; font-weight: 950; }
    .door-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .door {
      min-height: 114px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      text-align: left;
    }
    .door.active { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .door strong { display: flex; align-items: center; gap: 8px; font-size: 1.05rem; }
    .code { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 7px; color: #fff; background: var(--accent); font-weight: 950; }
    .door em { display: block; margin-top: 9px; color: var(--muted); font-style: normal; font-size: .9rem; line-height: 1.45; }
    .door small { display: inline-block; margin-top: 10px; color: var(--accent); font-weight: 900; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      min-height: 42px;
      padding: 0 13px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fffaf3;
      color: #342f2a;
      font-weight: 850;
    }
    .chip.active { color: #fff; background: var(--deep); border-color: var(--deep); }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 13px 14px;
      font-size: 1rem;
      line-height: 1.55;
      outline: none;
    }
    textarea { min-height: 130px; resize: vertical; }
    input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .soft {
      margin: 14px 0 0;
      padding: 14px;
      border: 1px solid rgba(0,0,0,.05);
      border-radius: 8px;
      background: var(--accent-soft);
      color: #3c352e;
      line-height: 1.62;
      word-break: keep-all;
    }
    .summary { display: grid; gap: 9px; }
    .summary-row { padding: 11px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .summary-row small { display: block; margin-bottom: 4px; color: var(--accent); font-weight: 950; }
    .summary-row div { color: #342f2a; font-size: .94rem; line-height: 1.5; white-space: pre-wrap; }
    .door-badge { display: flex; align-items: center; gap: 10px; padding: 12px; border: 1px solid var(--line); border-radius: 8px; background: #fff; }
    .door-badge .code { flex: 0 0 auto; width: 38px; height: 38px; font-size: 1.2rem; }
    .door-badge b { display: block; }
    .door-badge span { display: block; margin-top: 2px; color: var(--muted); font-size: .86rem; line-height: 1.35; }
    .coach { display: none; padding: 13px; border: 1px dashed rgba(17,24,39,.24); border-radius: 8px; background: #fff; color: var(--muted); font-size: .91rem; line-height: 1.62; }
    body.coach-on .coach { display: block; }
    .coach b { color: #2d2722; }
    .coach ul { margin: 8px 0 0; padding-left: 18px; }
    .nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 20;
      transform: translateX(-50%);
      width: min(1060px, 100% - 20px);
      display: grid;
      grid-template-columns: 1fr 1.35fr 1fr;
      gap: 8px;
      padding: 10px;
      margin-bottom: calc(10px + env(safe-area-inset-bottom));
      background: rgba(255,253,250,.92);
      backdrop-filter: blur(18px);
    }
    .nav button {
      min-height: 50px;
      border: 0;
      border-radius: 8px;
      font-weight: 950;
    }
    .nav .primary { color: #fff; background: var(--deep); }
    .nav .secondary { color: #312a23; background: #eee3d5; }
    .nav .ghost { color: #312a23; background: #fff; border: 1px solid var(--line); }
    .copybox { position: absolute; left: -9999px; opacity: 0; }
    .toast { position: fixed; left: 50%; bottom: 84px; z-index: 30; transform: translateX(-50%); padding: 10px 14px; border-radius: 999px; color: #fff; background: var(--deep); opacity: 0; pointer-events: none; transition: opacity .16s ease; }
    .toast.show { opacity: 1; }
    @media (max-width: 860px) {
      .shell { grid-template-columns: 1fr; }
      .side { position: static; }
      .panel { min-height: auto; }
    }
    @media (max-width: 560px) {
      .app { width: min(100% - 20px, 1060px); padding-top: 12px; }
      .top { align-items: flex-start; }
      .brand span { display: none; }
      .door-grid { grid-template-columns: 1fr; }
      .nav { grid-template-columns: 1fr 1fr; }
      .nav .ghost { grid-column: 1 / -1; order: 3; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <a class="brand" href="/" aria-label="DAILYCOACHING 홈">
        <span class="mark" id="brandMark">K</span>
        <span><b>DAILYCOACHING</b><span>KINGDOM 대화카드</span></span>
      </a>
      <div class="top-actions">
        <button class="pill" type="button" id="coachToggle">코치 보기</button>
        <button class="pill" type="button" id="resetBtn">새로 시작</button>
      </div>
    </header>

    <div class="progress" id="progress" aria-label="진행 상태"></div>
    <div class="shell">
      <section class="panel" id="screen" aria-live="polite"></section>
      <aside class="side" aria-label="선택 요약">
        <div class="door-badge">
          <span class="code" id="sideCode">K</span>
          <span><b id="sideTitle">내 페이스</b><span id="sideTone">내가 다시 멈추고 싶은 리듬</span></span>
        </div>
        <div class="summary" id="summary"></div>
        <div class="coach" id="coachBox"></div>
      </aside>
    </div>
  </main>

  <nav class="nav" aria-label="카드 이동">
    <button class="secondary" type="button" id="prevBtn">이전</button>
    <button class="primary" type="button" id="nextBtn">다음</button>
    <button class="ghost" type="button" id="copyBtn">요약 복사</button>
  </nav>
  <textarea class="copybox" id="copyText" tabindex="-1" aria-hidden="true"></textarea>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const STORE = 'kingdom.dialog.card.v1';
    const steps = [
      ['문 고르기', '지금 가장 가까운 문을 하나 고릅니다.', '고르기만 해도 대화의 입구가 생깁니다.'],
      ['오늘의 신호', '몸과 마음에 먼저 올라온 신호를 확인합니다.', '정답을 찾기보다 지금의 온도를 봅니다.'],
      ['이야기의 문', '반복되는 장면이나 마음속 말을 꺼냅니다.', '짧은 문장 하나면 충분합니다.'],
      ['세션 씨앗', '오늘 다뤄보고 싶은 핵심 씨앗을 고릅니다.', '코칭은 여기에서 바로 시작할 수 있습니다.'],
      ['시작 스타일', '어떤 방식으로 대화가 열리면 좋은지 정합니다.', '대화의 속도와 경계를 미리 맞춥니다.'],
      ['준비 브릿지', '바로 시작하기 전에 필요한 안전감을 확인합니다.', '말할 준비가 된 만큼만 가져갑니다.'],
      ['시작 문장', '코치에게 건넬 첫 문장을 완성합니다.', '복사해서 코칭 시작 문장으로 사용합니다.']
    ];
    const doors = {
      K: { code:'K', name:'King', word:'내 페이스', tag:'선택', color:'#6d5dfc', tone:'내가 다시 멈추고 싶은 리듬', question:'요즘 내 페이스가 사라졌다고 느껴지는 장면이 있나요?', scenes:['시간','공부/일','관계','가족','SNS','압박','잘 모르겠음'], seeds:['내 선택','내 기준','끌려감','멈추기','우선순위','작은 주도권','모르겠음'], openings:['요즘 제 페이스가 사라지는 느낌이 있어요.','제가 선택할 수 있는 부분을 다시 보고 싶어요.','계속 끌려가는 느낌이 들어서 이야기해보고 싶어요.'], coach:'선택권을 회복시키는 문입니다. 조언보다 고객이 직접 고를 수 있는 작은 지점을 먼저 비춰 주세요.' },
      I: { code:'I', name:'Identity', word:'나다움', tag:'정체성', color:'#c05a7a', tone:'나를 더 편하게 부르고 싶은 말', question:'요즘 나는 어떤 사람이어야 한다는 생각이 자주 드나요?', scenes:['비교','평가','실패','칭찬','친구','가족','잘 모르겠음'], seeds:['자존감','비교','나다움','시선','기대','내 말 찾기','아직 모름'], openings:['요즘 저를 어떻게 봐야 할지 잘 모르겠어요.','남의 기준 말고 제다운 말을 찾고 싶어요.','스스로를 판단하게 되는 일이 있어요.'], coach:'정체성을 규정하지 말고 안전한 자기표현을 돕는 문입니다. 고객의 단어를 그대로 존중해 주세요.' },
      N: { code:'N', name:'Narrative', word:'마음속 말', tag:'이야기', color:'#d27a2c', tone:'자꾸 마음에 남는 말', question:'요즘 마음속에서 반복해서 떠오르는 장면이나 말이 있나요?', scenes:['자책','걱정','서운함','실패','후회','갈등','잘 모르겠음'], seeds:['반복되는 말','자책','감정 이름','다른 해석','꺼내기','정리','아직 모름'], openings:['자꾸 반복되는 생각이 있어서 꺼내보고 싶어요.','어떤 장면이 계속 마음에 남아 있어요.','저에게 하는 말을 같이 봐주면 좋겠어요.'], coach:'서사를 분석하기보다 현재 세션으로 가져올 이야기의 입구를 정돈합니다.' },
      G: { code:'G', name:'Gift', word:'작은 힘', tag:'강점', color:'#1f9f74', tone:'이미 내 안에 있었던 힘', question:'최근 아주 작게라도 해냈다거나 나답다고 느낀 장면이 있나요?', scenes:['의지','버팀','집중','배려','용기','성찰','없음'], seeds:['숨은 강점','자신감','버틴 힘','내 장점','이미 준 것','가능성','아직 모름'], openings:['제가 별것 아니라고 넘긴 힘을 같이 보고 싶어요.','저에게 있는 작은 강점을 찾아보고 싶어요.','최근 버틴 일을 그냥 넘기지 않고 이야기해보고 싶어요.'], coach:'강점을 판정하지 말고 고객 안의 힘을 부담 없이 말할 수 있게 돕습니다.' },
      D: { code:'D', name:'Dominion', word:'부담', tag:'내 몫', color:'#7b6a58', tone:'내가 너무 많이 들고 있는 것', question:'요즘 이건 내가 다 해야 하나 싶었던 장면이 있나요?', scenes:['가족','친구','공부/일','기대','책임','눈치','잘 모르겠음'], seeds:['내 몫','남의 몫','경계','미안함','부담','책임','아직 모름'], openings:['제가 어디까지 책임져야 하는지 헷갈려요.','너무 많이 떠안고 있는 느낌이 있어요.','내 몫과 아닌 것을 구분해보고 싶어요.'], coach:'책임을 덜어내라는 결론보다 무엇이 내 몫인지 안전하게 구분하도록 돕습니다.' },
      O: { code:'O', name:'Opportunity', word:'시작', tag:'기회', color:'#1689b2', tone:'아직 닫히지 않은 작은 가능성', question:'미루고 있지만 마음 한쪽에 남아 있는 일이 있나요?', scenes:['미룬 일','배움','연락','정리','도전','진로','없음'], seeds:['첫 행동','막힌 이유','의지','시간','현실 점검','선택지','아직 모름'], openings:['작게라도 시작해보고 싶은 게 있어요.','미루고 있는 일을 어떻게 바라볼지 같이 보고 싶어요.','지금 가능한 첫 행동을 찾고 싶어요.'], coach:'실행 계획을 강요하기보다 가능성을 말할 수 있는 초대감을 만듭니다.' },
      M: { code:'M', name:'Meaning', word:'방향', tag:'의미', color:'#758110', tone:'경험이 남긴 작은 방향감', question:'지나갔지만 아직 마음에 남아 있는 경험이 있나요?', scenes:['성공','실패','갈등','감사','상실','전환점','없음'], seeds:['정리','배움','후회','감사','다음 방향','나의 변화','아직 모름'], openings:['지나간 일을 아직 정리하지 못한 느낌이 있어요.','그 경험이 저에게 무엇을 남겼는지 보고 싶어요.','앞으로의 방향을 조금 더 분명히 하고 싶어요.'], coach:'의미를 강요하지 말고 고객이 준비된 만큼 경험의 흔적을 들여다보게 합니다.' }
    };
    const moods = ['분주함','답답함','설렘','기대','흔들림','피로','괜찮음','잘 모르겠음'];
    const styles = ['먼저 들어주기','천천히 질문','짧게 정리해주기','중간에 멈춰주기','비교하지 않기','조언은 나중에','가볍게 시작','침묵도 괜찮게'];
    const ready = ['바로 시작 가능','한 번 숨 고르기','질문을 천천히','짧게만 말하기','코치가 정리해주기','아직 조심스러움'];
    let state = load();
    let step = Math.min(6, Math.max(0, Number(location.hash.replace('#','')) || 0));

    function load(){ try { return JSON.parse(localStorage.getItem(STORE)) || { door:'K' }; } catch(e) { return { door:'K' }; } }
    function save(){ localStorage.setItem(STORE, JSON.stringify(state)); renderSide(); }
    function door(){ return doors[state.door] || doors.K; }
    function esc(value){ return String(value || '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m])); }
    function setAccent(){ const d = door(); document.documentElement.style.setProperty('--accent', d.color); document.documentElement.style.setProperty('--accent-soft', hexToRgba(d.color, .12)); document.getElementById('brandMark').textContent = d.code; }
    function hexToRgba(hex, alpha){ const n = parseInt(hex.replace('#',''), 16); return `rgba(${(n>>16)&255}, ${(n>>8)&255}, ${n&255}, ${alpha})`; }
    function list(items){ return (items && items.length) ? items.join(', ') : '아직 선택 전'; }
    function text(value, fallback){ return value && String(value).trim() ? String(value).trim() : fallback; }
    function chipHtml(group, items){ const picked = state[group] || []; return items.map(item => `<button class="chip ${picked.includes(item) ? 'active' : ''}" type="button" data-chip="${group}" data-value="${esc(item)}">${esc(item)}</button>`).join(''); }

    function render(){
      setAccent();
      document.body.classList.toggle('coach-on', !!state.coach);
      const [title, heading, lead] = steps[step];
      document.getElementById('progress').innerHTML = steps.map((_, i) => `<i class="${i <= step ? 'on' : ''}"></i>`).join('');
      document.getElementById('screen').innerHTML = `<div class="kicker"><span>${String(step + 1).padStart(2,'0')} · ${title}</span><span>${step + 1} / 7</span></div><h1>${heading}</h1><p class="lead">${lead}</p>${screenBody()}`;
      document.getElementById('prevBtn').disabled = step === 0;
      document.getElementById('nextBtn').textContent = step === 6 ? '완료' : '다음';
      renderSide();
      bindInputs();
    }

    function screenBody(){
      const d = door();
      if (step === 0) return `<div class="door-grid">${Object.values(doors).map(item => `<button class="door ${item.code === d.code ? 'active' : ''}" type="button" data-door="${item.code}"><strong><span class="code">${item.code}</span>${item.word}</strong><em>${item.tone}</em><small>${item.tag}</small></button>`).join('')}</div><label class="section-label" for="alias">불러줄 이름</label><input id="alias" value="${esc(state.alias)}" placeholder="예: 민지, J, 오늘의 나"><label class="section-label">말할 깊이</label><div class="chips">${chipHtml('depth', ['가볍게','천천히','조금 진지하게','아직 모르겠음'])}</div>`;
      if (step === 1) return `<div class="soft">${esc(d.question)}</div><label class="section-label">오늘의 신호</label><div class="chips">${chipHtml('mood', moods)}</div><label class="section-label" for="moodNote">지금 몸이나 마음의 느낌</label><textarea id="moodNote" placeholder="지금 가장 먼저 느껴지는 신호를 적어보세요.">${esc(state.moodNote)}</textarea>`;
      if (step === 2) return `<div class="soft">반복되는 장면을 하나만 골라도 충분합니다.</div><label class="section-label">가까운 장면</label><div class="chips">${chipHtml('scene', d.scenes)}</div><label class="section-label" for="sceneNote">마음속 말</label><textarea id="sceneNote" placeholder="계속 떠오르는 말이나 장면을 짧게 적어보세요.">${esc(state.sceneNote)}</textarea>`;
      if (step === 3) return `<label class="section-label">오늘의 세션 씨앗</label><div class="chips">${chipHtml('seed', d.seeds)}</div><label class="section-label" for="seedNote">가장 다뤄보고 싶은 한 가지</label><textarea id="seedNote" placeholder="오늘 이 대화에서 보고 싶은 것을 적어보세요.">${esc(state.seedNote)}</textarea>`;
      if (step === 4) return `<label class="section-label">대화가 열리는 방식</label><div class="chips">${chipHtml('style', styles)}</div><label class="section-label" for="avoidNote">피하고 싶은 방식</label><textarea id="avoidNote" placeholder="조언이 빠르면 부담스럽다, 비교는 피하고 싶다처럼 적어보세요.">${esc(state.avoidNote)}</textarea>`;
      if (step === 5) return `<div class="soft"><b>브릿지</b><br>좋아요. 지금은 “${esc(d.word)}” 문으로 들어왔고, 이 대화는 ${esc(d.tag)}을 중심으로 천천히 시작할 수 있습니다.</div><label class="section-label">시작 전 필요한 것</label><div class="chips">${chipHtml('ready', ready)}</div><label class="section-label" for="beforeStart">코치가 먼저 알아두면 좋은 것</label><textarea id="beforeStart" placeholder="말하기 전에 필요한 안전감이나 요청을 적어보세요.">${esc(state.beforeStart)}</textarea>`;
      return `<label class="section-label">시작 문장 선택</label><div class="chips">${d.openings.map(item => `<button class="chip ${state.opening === item ? 'active' : ''}" type="button" data-opening="${esc(item)}">${esc(item)}</button>`).join('')}</div><label class="section-label" for="opening">내 시작 문장</label><textarea id="opening">${esc(text(state.opening, d.openings[0]))}</textarea><div class="soft"><b>코칭 시작</b><br>${esc(text(state.opening, d.openings[0]))}</div>`;
    }

    function renderSide(){
      const d = door();
      document.getElementById('sideCode').textContent = d.code;
      document.getElementById('sideTitle').textContent = d.word;
      document.getElementById('sideTone').textContent = d.tone;
      const rows = [
        ['선택한 문', `${d.code} · ${d.word}`],
        ['말할 깊이', list(state.depth)],
        ['오늘의 신호', list(state.mood)],
        ['장면', text(state.sceneNote, list(state.scene))],
        ['세션 씨앗', text(state.seedNote, list(state.seed))],
        ['시작 방식', list(state.style)],
        ['시작 문장', text(state.opening, d.openings[0])]
      ];
      document.getElementById('summary').innerHTML = rows.map(([key, value]) => `<div class="summary-row"><small>${esc(key)}</small><div>${esc(value)}</div></div>`).join('');
      document.getElementById('coachBox').innerHTML = `<b>코치 포인트</b><p>${esc(d.coach)}</p><ul><li>먼저 고객의 단어를 그대로 되돌려 주세요.</li><li>해결책보다 지금 다루고 싶은 초점을 확인해 주세요.</li><li>마지막에는 다음 질문 하나로 연결하면 충분합니다.</li></ul>`;
      document.getElementById('copyText').value = rows.map(([key, value]) => `${key}: ${value}`).join('\n');
    }

    function bindInputs(){
      ['alias','moodNote','sceneNote','seedNote','avoidNote','beforeStart','opening'].forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        el.addEventListener('input', () => { state[id] = el.value.trim(); if (id === 'opening') state.opening = el.value.trim(); save(); });
      });
    }

    document.addEventListener('click', event => {
      const doorButton = event.target.closest('[data-door]');
      if (doorButton) { state.door = doorButton.dataset.door; save(); render(); return; }
      const chip = event.target.closest('[data-chip]');
      if (chip) {
        const group = chip.dataset.chip;
        const value = chip.dataset.value;
        state[group] = state[group] || [];
        state[group] = state[group].includes(value) ? state[group].filter(item => item !== value) : [...state[group], value];
        save(); render(); return;
      }
      const opening = event.target.closest('[data-opening]');
      if (opening) { state.opening = opening.dataset.opening; save(); render(); }
    });
    document.getElementById('prevBtn').addEventListener('click', () => { if (step > 0) { step -= 1; location.hash = String(step); render(); } });
    document.getElementById('nextBtn').addEventListener('click', () => { if (step < 6) { step += 1; location.hash = String(step); render(); } else { copySummary(); } });
    document.getElementById('copyBtn').addEventListener('click', copySummary);
    document.getElementById('coachToggle').addEventListener('click', () => { state.coach = !state.coach; save(); render(); });
    document.getElementById('resetBtn').addEventListener('click', () => { if (!confirm('입력한 내용을 지우고 새로 시작할까요?')) return; state = { door:'K', coach: state.coach }; save(); step = 0; location.hash = '0'; render(); });
    window.addEventListener('hashchange', () => { step = Math.min(6, Math.max(0, Number(location.hash.replace('#','')) || 0)); render(); });

    async function copySummary(){
      renderSide();
      const text = document.getElementById('copyText').value;
      try { await navigator.clipboard.writeText(text); toast('요약을 복사했습니다.'); }
      catch (error) { const box = document.getElementById('copyText'); box.style.position = 'fixed'; box.style.left = '12px'; box.style.opacity = '1'; box.select(); toast('선택된 내용을 복사하세요.'); }
    }
    function toast(message){ const el = document.getElementById('toast'); el.textContent = message; el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 1400); }
    render();
  </script>
</body>
</html>
