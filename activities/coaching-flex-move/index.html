<body>
<div class="load"><div><b>COACHING FLEX MOVE</b><p id="status">SELF FLEX와 LIVE FLEX를 불러오는 중입니다.</p></div></div>
<script>
(async()=>{try{
 if(!('DecompressionStream' in window)) throw new Error('unsupported');
 const names=['./cfm-v4.part1.txt?v=20260722-v4-integrated','./cfm-v4.part2.txt?v=20260722-v4-integrated','./cfm-v4.part3.txt?v=20260722-v4-integrated','./cfm-v4.part4.txt?v=20260722-v4-integrated','./cfm-v4.part5.txt?v=20260722-v4-integrated','./cfm-v4.part6.txt?v=20260722-v4-integrated','./cfm-v4.part7.txt?v=20260722-v4-integrated'];
 const chunks=await Promise.all(names.map(async name=>{const r=await fetch(name,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}));
 const bin=atob(chunks.join(''));const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
 const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
 const html=await new Response(stream).text();
 document.open();document.write(html);document.close();
}catch(e){
 document.getElementById('status').innerHTML='통합형 페이지를 불러오지 못했습니다.<br>브라우저를 최신 버전으로 업데이트한 뒤 다시 시도해 주세요.<br><a href="./legacy-v3.html">기존 전문가 사고 학습 버전 열기</a><br><a href="/">데일리코칭 홈으로 돌아가기</a>';
 console.error(e);
}})();
</script>
