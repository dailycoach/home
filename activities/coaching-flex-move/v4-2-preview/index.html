<script>
(async()=>{try{
 if(!('DecompressionStream' in window))throw new Error('unsupported');
 const base='../',version='20260723-public3';

 const bin=atob(chunks.join(''));const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));

 let html=await new Response(stream).text();

 document.open();document.write(html);document.close();
