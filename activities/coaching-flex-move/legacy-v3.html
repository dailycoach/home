<body><div class="load"><div><b>COACHING FLEX MOVE v3</b><p id="status">기존 전문가 사고 학습 버전을 불러오는 중입니다.</p></div></div>
<script>
(async()=>{try{
 if(!('DecompressionStream' in window)) throw new Error('unsupported');
 const names=['./cfm-v3.1.part1.txt?v=20260722','./cfm-v3.1.part2.txt?v=20260722','./cfm-v3.1.part3.txt?v=20260722','./cfm-v3.1.part4a.txt?v=20260722','./cfm-v3.1.part4b1.txt?v=20260722','./cfm-v3.1.part4b21.txt?v=20260722','./cfm-v3.1.part4b22.txt?v=20260722','./cfm-v3.1.part4b23.txt?v=20260722','./cfm-v3.1.part4b24.txt?v=20260722','./cfm-v3.1.part4b3.txt?v=20260722','./cfm-v3.1.part4b4.txt?v=20260722','./cfm-v3.1.part4c.txt?v=20260722','./cfm-v3.1.part4d.txt?v=20260722','./cfm-v3.1.part5.txt?v=20260722'];
 const chunks=await Promise.all(names.map(async name=>{const r=await fetch(name,{cache:'no-store'});if(!r.ok)throw new Error('HTTP '+r.status);return r.text()}));
 const bin=atob(chunks.join(''));const bytes=Uint8Array.from(bin,c=>c.charCodeAt(0));
 const stream=new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
 const html=await new Response(stream).text();
 document.open();document.write(html);document.close();
}catch(e){document.getElementById('status').innerHTML='보존본을 불러오지 못했습니다.<br><a href="./">통합형으로 돌아가기</a><br><a href="/">데일리코칭 홈으로 돌아가기</a>';console.error(e);}})();
</script></body></html>
