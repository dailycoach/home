<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>기업소개 | DAILYCOACHING</title>
  <style>
    :root {
      --bg: #f7f4ee;
      --ink: #152033;
      --muted: rgba(21, 32, 51, .68);
      --line: rgba(21, 32, 51, .12);
      --brand: #c49a57;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 16% 10%, rgba(196, 154, 87, .22), transparent 28%),
        linear-gradient(140deg, #fffaf0 0%, var(--bg) 52%, #ecf2f8 100%);
    }
    main {
      width: min(100% - 36px, 860px);
      margin: 0 auto;
      padding: 72px 0;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 8vw, 5rem);
      line-height: 1.05;
      letter-spacing: -.02em;
    }
    p {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 34px;
    }
    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: inherit;
      text-decoration: none;
      font-weight: 800;
      background: rgba(255, 255, 255, .56);
    }
    a.primary {
      border-color: transparent;
      background: var(--ink);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">DAILYCOACHING</p>
    <h1>기업소개</h1>
    <p>데일리코칭의 철학, 교육 서비스, 운영 구조를 담는 소개 페이지입니다. 현재는 메인 사이트 통합을 위해 경로를 먼저 열어두었습니다.</p>
    <div class="actions">
      <a class="primary" href="../">첫 화면으로</a>
      <a href="../lcms/">LCMS 보기</a>
    </div>
  </main>
</body>
</html>
