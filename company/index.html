    :root {

    * { box-sizing: border-box; }

      font-size: clamp(1rem, 1.5vw, 1.38rem);
      font-weight: 700;
      letter-spacing: .18em;
      white-space: nowrap;
    }
    .brand::before {
      content: "";
      width: 32px;
      height: 1px;
      background: var(--gold);
      opacity: .9;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .nav a {

      padding: 0 13px;
      display: inline-flex;

      border-radius: 999px;
      color: rgba(255,255,255,.82);

    .nav a:hover { background: rgba(255,255,255,.10); color: #fff; }
    .nav .cta {

      color: var(--navy-980);
      background: linear-gradient(135deg, #efd38e, #c49148);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 16px 34px rgba(3, 16, 34, .24);

    .company-visual {

      background:

        linear-gradient(180deg, #061528 0%, #0b1d35 44%, #fffaf2 44%, #fffaf2 100%);
      overflow: visible;
      display: block;
      padding: 0;
    }

    .company-visual img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      object-position: top center;
      filter: saturate(.98) contrast(1.02);
    }

    .footer {
      background: var(--navy-950);
      color: #fff;
      padding: 46px 0;
    }
    .footer-inner {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      color: rgba(255,255,255,.72);
      font-size: .92rem;
      font-weight: 700;
    }
    .footer strong {

    @media (max-width: 920px) {
      .nav { display: none; }
      .footer-inner { flex-direction: column; align-items: flex-start; }

    @media (max-width: 540px) {
      :root { --header-h: 66px; }
      .header-inner { width: calc(100% - 28px); }
      .brand { font-size: .92rem; letter-spacing: .14em; }
