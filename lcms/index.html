<head>

    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
    a { display: inline-flex; align-items: center; min-height: 48px; padding: 0 18px; border: 1px solid rgba(255,255,255,.12); color: #fff; font-weight: 750; text-decoration: none; }
    a:first-child { background: #315fff; border-color: transparent; }
    a:last-child { background: rgba(255,255,255,.05); }
  </style>
  <script>
    window.location.replace("./platform.html");

</head>

</html>
