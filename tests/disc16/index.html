<!doctype html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/><title>DISC16 행동스타일 코칭검사</title>
<style>
:root{--bg:#0c1016;--deep:#090c11;--panel:#151b24;--panel2:#1b222d;--line:#303847;--text:#f4efe6;--muted:#b7bfcc;--gold:#d8b56b;--ivory:#ece5d9;--rose:#d99a9a;--sage:#86b79a;--d:#e15e5b;--i:#f0a64a;--s:#67ad82;--c:#658fd5}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:radial-gradient(circle at 50% -20%,#182334 0,transparent 36%),linear-gradient(180deg,var(--deep),var(--bg));color:var(--text);font-family:Pretendard,"Noto Sans KR",sans-serif;line-height:1.62}.app{width:min(780px,100%);margin:auto;min-height:100vh;padding:24px 18px 80px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.brand{font-size:12px;color:var(--gold);letter-spacing:.14em}.progress{font-size:13px;color:var(--muted)}.bar{height:4px;background:#252d39;border-radius:99px;overflow:hidden;margin-bottom:28px}.bar>i{display:block;height:100%;background:linear-gradient(90deg,#9c814b,var(--gold),#f2d898);width:0;transition:.3s}.card{background:linear-gradient(180deg,rgba(27,34,45,.98),rgba(21,27,36,.98));border:1px solid var(--line);border-radius:24px;padding:26px;box-shadow:0 22px 64px rgba(0,0,0,.3)}h1,h2,h3,p{margin-top:0}h1{font-size:35px;line-height:1.18;margin-bottom:16px;letter-spacing:-.04em}h2{font-size:25px;line-height:1.38;letter-spacing:-.025em}h3{font-size:18px}.lead{font-size:17px;color:#e5e9ef}.muted{color:var(--muted)}button{font:inherit}.primary,.ghost{width:100%;border-radius:15px;padding:15px 18px;font-weight:750;cursor:pointer}.primary{border:1px solid #ead39c;background:linear-gradient(180deg,#e2c37f,#caa65d);color:#17130b;box-shadow:0 10px 30px rgba(216,181,107,.14)}.ghost{border:1px solid var(--line);background:#111720;color:var(--text)}.guide{display:grid;gap:10px;margin:24px 0}.guide div{padding:14px 15px;border:1px solid var(--line);border-radius:15px;color:#dce1e8;background:rgba(9,12,17,.22)}.question{font-size:23px;line-height:1.42;margin-bottom:21px}.options{display:grid;gap:12px}.option{position:relative;width:100%;text-align:left;border:1px solid var(--line);background:#111720;color:var(--text);border-radius:17px;padding:18px 58px 18px 18px;cursor:pointer;transition:.18s}.option:hover{border-color:#606c7d;background:#151c27}.option.selected{background:#1a2029}.option.selected:nth-child(n){border-width:2px}.rank{position:absolute;right:15px;top:50%;transform:translateY(-50%);width:31px;height:31px;border-radius:50%;display:grid;place-items:center;font-weight:850}.option[data-rank="1"]{border-color:var(--gold)}.option[data-rank="1"] .rank{background:var(--gold);color:#15110a;box-shadow:0 0 0 5px rgba(216,181,107,.1)}.option[data-rank="2"]{border-color:#d8d2c8}.option[data-rank="2"] .rank{background:#e9e4db;color:#171a20}.option[data-rank="3"]{border-color:#778292}.option[data-rank="3"] .rank{background:#778292;color:white}.option[data-rank="4"]{border-color:#4c5563}.option[data-rank="4"] .rank{background:#4c5563;color:white}.nav{display:flex;gap:10px;margin-top:17px}.nav button{flex:1}.hidden{display:none!important}.result-head{position:relative;text-align:center;overflow:hidden;border-radius:21px;padding:30px 18px 25px;margin-bottom:18px;background:linear-gradient(145deg,var(--tone1,rgba(216,181,107,.12)),var(--tone2,rgba(255,255,255,.02)));border:1px solid var(--line)}.result-head:before{content:"";position:absolute;width:230px;height:230px;border-radius:50%;background:var(--glow,rgba(216,181,107,.18));filter:blur(45px);top:-130px;right:-70px}.type-code{position:relative;font-size:58px;font-weight:950;letter-spacing:.04em}.type-code .main{color:var(--mainColor,var(--gold))}.type-code .sub{font-size:.68em;color:var(--subColor,var(--gold));margin-left:3px}.type-name{position:relative;font-size:26px;font-weight:850;margin-bottom:9px}.result-head .lead{position:relative;max-width:610px;margin:0 auto}.score-list{display:grid;gap:14px;margin:22px 0}.score-row{display:grid;grid-template-columns:40px 1fr 42px;gap:11px;align-items:center}.score-label{font-weight:900;font-size:18px}.score-copy{font-size:13px;color:var(--muted);margin-bottom:5px}.track{height:10px;background:#252d39;border-radius:99px;overflow:hidden}.fill{height:100%;border-radius:99px}.score-value{text-align:right;font-weight:800}.map-wrap{padding:14px;background:#0d1219;border:1px solid var(--line);border-radius:20px;margin:8px 0 18px}.axis-note{display:flex;justify-content:space-between;color:var(--muted);font-size:12px;margin-top:6px}.axis-note.vertical{justify-content:center;margin-bottom:7px}canvas{display:block;width:100%;aspect-ratio:1/1;border-radius:15px}.section{margin-top:31px}.scene{position:relative;border:1px solid var(--line);border-left:4px solid var(--mainColor,var(--gold));background:#181d25;padding:17px 17px 17px 18px;margin:13px 0;border-radius:4px 15px 15px 4px}.scene strong{display:block;margin-bottom:6px;color:var(--ivory)}.meaning-grid{display:grid;gap:12px}.meaning{border-radius:15px;padding:16px;border:1px solid var(--line);background:#171c24}.meaning.intent{border-left:3px solid var(--gold)}.meaning.other{border-left:3px solid var(--rose)}.meaning.next{border-left:3px solid var(--sage)}.meaning b{display:block;margin-bottom:5px}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:6px 10px;margin:3px 4px 3px 0;color:#dce1e8;font-size:13px;background:#121821}.question-list{background:#1b1917;border:1px solid #443a2d;border-radius:18px;padding:5px 18px}.coach-q{display:grid;grid-template-columns:32px 1fr;gap:9px;padding:17px 0;border-bottom:1px solid #3c342a}.coach-q:last-child{border-bottom:0}.coach-q span{font-size:12px;color:var(--gold);padding-top:4px}.coach-q p{margin:0;font-size:17px}.notice{font-size:13px;color:var(--muted);border-top:1px solid var(--line);padding-top:18px;margin-top:30px}@media(max-width:520px){h1{font-size:29px}.question{font-size:20px}.card{padding:20px}.score-row{grid-template-columns:34px 1fr 38px}.result-head{padding:25px 14px 22px}.type-code{font-size:51px}}
</style></head><body><main class="app"><div class="top"><div class="brand">DAILY COACHING · DISC16</div><div id="progressText" class="progress"></div></div><div class="bar"><i id="progressBar"></i></div><section id="start" class="card"><h1>나는 사람과 일을<br>어떻게 움직이는가?</h1><p class="lead">사람은 한 가지 유형으로 살아가지 않습니다. 다만 더 익숙하게 사용하는 행동의 순서가 있습니다.</p><div class="guide"><div>가장 나다운 문장부터 <b>1·2·3·4순위</b>로 선택합니다.</div><div>이상적인 모습보다 평소 반복되는 행동을 떠올립니다.</div><div>20개 장면을 모두 선택하면 관계 사례와 코칭질문이 제공됩니다.</div></div><button class="primary" id="startBtn">나의 행동분포 알아보기</button><p class="notice">본 검사는 MBTI® 검사가 아니며, DISC 행동모델을 참고해 독립 개발한 자기이해 및 코칭대화 도구입니다.</p></section><section id="test" class="card hidden"><h2 id="question" class="question"></h2><div id="options" class="options"></div><div class="nav"><button class="ghost" id="prevBtn">이전 문항</button><button class="ghost" id="resetBtn">이 문항 다시 선택</button></div></section><section id="result" class="card hidden"></section></main>
<script>
const Q=[['새로운 일을 맡았을 때 나는',['핵심 목표를 정하고 바로 움직인다.','함께할 사람들과 아이디어를 주고받는다.','기존 흐름과 구성원의 상황을 먼저 살핀다.','필요한 정보와 조건을 자세히 확인한다.']],['회의가 길어질 때 나는',['결정해야 할 핵심을 정리해 결론을 제시한다.','사람들의 반응을 끌어내며 분위기를 바꾼다.','아직 말하지 않은 사람의 의견을 기다린다.','논점과 근거가 충분한지 다시 확인한다.']],['처음 만난 사람들과 있을 때 나는',['필요한 역할과 방향을 빠르게 파악한다.','먼저 말을 걸고 공통점을 찾는다.','상대가 편안해질 때까지 천천히 다가간다.','상황을 관찰하며 적절한 표현을 고른다.']],['계획을 실행할 때 나는',['속도를 높여 눈에 보이는 결과를 만든다.','사람들의 의욕과 참여를 끌어올린다.','무리 없이 꾸준히 이어지도록 돕는다.','빠진 부분과 예상 문제를 점검한다.']],['의견이 서로 다를 때 나는',['필요한 결론을 분명하게 제시한다.','대화를 이어가며 분위기를 풀어간다.','서로 불편해지지 않도록 중간을 조율한다.','어느 의견에 더 타당한 근거가 있는지 살핀다.']],['가까운 사람이 고민을 말할 때 나는',['문제를 해결할 방법부터 함께 찾는다.','대화를 통해 기분과 가능성을 북돋운다.','충분히 말할 수 있도록 오래 들어준다.','상황을 정확히 이해하기 위해 질문한다.']],['일정이 갑자기 바뀌면 나는',['새 방향을 정하고 빠르게 재배치한다.','변화를 긍정적으로 설명하며 사람을 움직인다.','구성원이 적응할 시간을 확보하려 한다.','변경 조건과 영향을 하나씩 확인한다.']],['역할이 불분명할 때 나는',['내가 먼저 책임지고 방향을 잡는다.','대화를 통해 자연스럽게 역할을 나눈다.','필요한 곳을 조용히 채우며 기다린다.','역할과 기준을 명확히 정리한다.']],['성과가 늦어질 때 나는',['장애물을 없애고 속도를 끌어올린다.','사람들의 동기를 다시 높이려 한다.','지친 사람이 없는지 살피며 흐름을 유지한다.','원인을 분석하고 잘못된 과정을 수정한다.']],['새로운 아이디어를 들으면 나는',['실행 가치가 있으면 바로 시험해 본다.','가능성을 확장해 더 재미있게 발전시킨다.','사람들이 받아들일 수 있을지 먼저 살핀다.','현실성과 위험요인을 검토한다.']],['누군가 실수했을 때 나는',['바로 수정하고 다음 행동을 정한다.','분위기가 무너지지 않게 격려한다.','당사자가 위축되지 않도록 돕는다.','원인과 재발 가능성을 꼼꼼히 확인한다.']],['부탁을 받았을 때 나는',['필요성과 우선순위를 빠르게 판단한다.','관계와 분위기를 고려해 적극 반응한다.','상대가 곤란해 보이면 가능한 한 돕는다.','조건과 책임 범위를 먼저 확인한다.']],['갈등이 커질 때 나는',['직접 문제를 꺼내 해결을 요구한다.','대화를 이어가며 관계를 다시 연결한다.','감정이 가라앉을 때까지 속도를 늦춘다.','사실과 해석을 분리해 정리한다.']],['중요한 결정을 앞두면 나는',['책임지고 한 방향을 선택한다.','주변의 반응과 가능성을 폭넓게 듣는다.','관계에 미칠 영향을 충분히 고려한다.','필요한 자료와 기준을 끝까지 검토한다.']],['팀 분위기가 가라앉으면 나는',['목표와 우선순위를 다시 분명히 한다.','말과 에너지로 분위기를 끌어올린다.','한 사람씩 상태를 살피고 안정시킨다.','문제의 원인과 구조를 차분히 점검한다.']],['마감이 가까워지면 나는',['필요한 결정을 줄이고 완성에 집중한다.','사람들에게 힘을 북돋우며 함께 밀어붙인다.','팀이 무너지지 않도록 역할을 나눠 돕는다.','오류가 남지 않도록 최종 검수를 강화한다.']],['낯선 환경에서는 나는',['주도권을 잡을 기회를 빠르게 찾는다.','사람과 연결되며 환경에 적응한다.','익숙해질 때까지 조심스럽게 움직인다.','규칙과 기대 수준을 먼저 파악한다.']],['칭찬을 들었을 때 나는',['다음 목표와 도전을 떠올린다.','기쁨을 표현하고 함께 나누고 싶어진다.','나를 도운 사람들을 먼저 생각한다.','무엇이 잘 작동했는지 분석한다.']],['압박을 받을 때 나는',['말이 짧아지고 통제하려는 경향이 강해진다.','더 많이 말하거나 즉흥적으로 반응한다.','겉으로 참으며 갈등을 피하려 한다.','더 많은 정보와 확실성을 요구한다.']],['함께 일하고 싶은 사람은',['결정이 빠르고 책임지는 사람이다.','활기 있고 소통이 자연스러운 사람이다.','신뢰할 수 있고 꾸준한 사람이다.','정확하고 기준이 분명한 사람이다.']]];

const info={D:{name:'돌파하는 추진가',core:'목표가 보이면 빠르게 판단하고 상황을 직접 움직이는 행동이 가장 자연스럽습니다.',intent:'상황을 빨리 개선하고 결과를 만들고 싶습니다.',other:'상대는 자신의 말이나 감정이 충분히 다뤄지지 않았다고 느낄 수 있습니다.',experiment:'결론을 말하기 전에 상대의 말을 한 문장으로 요약해 보세요.',scenes:[['회의에서','이야기가 반복되면 “그래서 지금 무엇을 결정해야 하나요?”라고 묻고 방향을 정하려 합니다.'],['가족·연인과','고민을 오래 나누기보다 해결책부터 제시할 가능성이 큽니다.'],['일이 늦어질 때','기다리기보다 직접 개입하거나 역할을 다시 정하려 합니다.']]},I:{name:'사람을 여는 연결자',core:'사람과 에너지를 주고받으며 표현과 설득으로 관계를 움직이는 행동이 자연스럽습니다.',intent:'분위기를 살리고 사람을 연결하고 싶습니다.',other:'상대는 자신의 이야기가 충분히 깊게 다뤄지지 않았다고 느낄 수 있습니다.',experiment:'자신의 경험을 말하기 전에 상대에게 질문을 하나 더 해보세요.',scenes:[['처음 만난 자리에서','먼저 말을 걸고 공통점을 찾으며 분위기를 빠르게 편안하게 만듭니다.'],['아이디어 회의에서','완성된 계획보다 가능성과 흥미로운 생각을 먼저 꺼냅니다.'],['갈등이 생기면','무거운 분위기를 풀기 위해 농담하거나 화제를 전환할 수 있습니다.']]},S:{name:'곁을 지키는 조율자',core:'관계의 안정과 지속을 중요하게 여기며 사람을 편안하게 돕는 행동이 자연스럽습니다.',intent:'관계를 불편하게 만들지 않고 오래 함께하고 싶습니다.',other:'상대는 당신이 괜찮다고 했으니 정말 괜찮은 줄 알 수 있습니다.',experiment:'동의하기 전에 “생각할 시간이 조금 필요합니다”라고 말해보세요.',scenes:[['모임에서','자신의 의견보다 모두가 받아들일 수 있는 중간 지점을 찾으려 합니다.'],['부탁을 받을 때','이미 일이 많아도 상대가 곤란해 보이면 쉽게 거절하지 못합니다.'],['변화가 생기면','바로 반대하지 않지만 충분히 준비하고 적응할 시간을 원합니다.']]},C:{name:'기준을 세우는 설계자',core:'근거와 기준을 확인한 뒤 정확하게 움직이며 실수를 줄이는 행동이 자연스럽습니다.',intent:'제대로 이해하고 완성도를 높이고 싶습니다.',other:'상대는 자신의 노력보다 부족한 점만 본다고 느낄 수 있습니다.',experiment:'수정점을 말하기 전에 잘 작동한 부분을 한 가지 먼저 말해보세요.',scenes:[['새 제안을 들으면','가능성보다 일정·비용·위험요인을 먼저 질문합니다.'],['함께 일할 때','작은 오류나 빠진 부분을 빠르게 발견해 완성도를 높입니다.'],['결정해야 할 때','정보가 부족하면 서두르기보다 더 확인하려 합니다.']]}};

function showResult(){cancelAdvance();test.classList.add('hidden');result.classList.remove('hidden');$('#progressText').textContent='결과';$('#progressBar').style.width='100%';const scores={D:0,I:0,S:0,C:0};answers.forEach(a=>a.forEach((opt,rank)=>scores[TYPES[opt]]+=4-rank));const scale=Object.fromEntries(TYPES.map(t=>[t,(scores[t]-Q.length)/(Q.length*3)*10]));const sorted=Object.entries(scores).sort((a,b)=>b[1]-a[1]),first=sorted[0][0],second=sorted[1][0],gap=sorted[0][1]-sorted[1][1],code=gap>=10?first:first+second,detail=combo[code]||info[first],title=detail.name;const axisMax=Q.length*4,x=clamp(5+5*((scores.D+scores.I)-(scores.S+scores.C))/axisMax),y=clamp(5+5*((scores.D+scores.C)-(scores.I+scores.S))/axisMax),spread=gap>=18?'좁은 분포':gap>=8?'중간 분포':'넓은 분포',strength=Math.max(Math.abs(x-5),Math.abs(y-5))>=3.2?'선명한 편향':Math.max(Math.abs(x-5),Math.abs(y-5))>=1.7?'뚜렷한 경향':'중심 인접';const scenes=combo[code]?[['대표 관계 장면',detail.scene],['상대가 다르게 느낄 수 있는 순간',detail.risk],['다음 관계에서',detail.experiment]]:info[first].scenes;const codeHtml=code.length===2?`<span class="main">${code[0]}</span><span class="sub">${code[1]}</span>`:`<span class="main">${code}</span>`;result.style.setProperty('--mainColor',COL[first]);result.style.setProperty('--subColor',COL[second]);result.style.setProperty('--tone1',COL[first]+'20');result.style.setProperty('--tone2',COL[second]+'12');result.style.setProperty('--glow',COL[first]+'30');result.innerHTML=`<div class="result-head"><div class="type-code">${codeHtml}</div><div class="type-name">${title}</div><p class="lead">${detail.core}</p></div><div class="score-list">${TYPES.map(t=>`<div class="score-row"><div class="score-label" style="color:${COL[t]}">${t}</div><div><div class="score-copy">${COPY[t]}</div><div class="track"><div class="fill" style="width:${scale[t]*10}%;background:${COL[t]}"></div></div></div><div class="score-value">${scale[t].toFixed(1)}</div></div>`).join('')}</div><div class="map-wrap"><div class="axis-note vertical">과제와 성과를 우선 function clamp(v){return Math.max(0,Math.min(10,v))}function draw(x,y,spread,first,second){const c=$('#map'),g=c.getContext('2d'),w=c.width,h=c.height,p=64,plot=w-p*2;g.clearRect(0,0,w,h);g.fillStyle='#10161e';g.fillRect(0,0,w,h);[['C',p,p,COL.C],['D',w/2,p,COL.D],['S',p,h/2,COL.S],['I',w/2,h/2,COL.I]].forEach(([t,a,b,col])=>{g.globalAlpha=.055;g.fillStyle=col;g.fillRect(a,b,plot/2,plot/2);g.globalAlpha=1});g.strokeStyle='#273140';g.lineWidth=1;for(let i=0;i<=10;i++){const k=p+plot*i/10;g.beginPath();g.moveTo(k,p);g.lineTo(k,h-p);g.stroke();g.beginPath();g.moveTo(p,k);g.lineTo(w-p,k);g.stroke()}g.strokeStyle='#7f6c45';g.lineWidth=2;g.beginPath();g.moveTo(w/2,p);g.lineTo(w/2,h-p);g.moveTo(p,h/2);g.lineTo(w-p,h/2);g.stroke();g.font='bold 29px sans-serif';g.fillStyle=COL.C;g.fillText('C',p+18,p+40);g.fillStyle=COL.D;g.fillText('D',w-p-42,p+40);g.fillStyle=COL.S;g.fillText('S',p+18,h-p-18);g.fillStyle=COL.I;g.fillText('I',w-p-38,h-p-18);const px=p+plot*x/10,py=h-p-plot*y/10,r=spread==='넓은 분포'?72:spread==='중간 분포'?50:34;g.save();g.translate(px,py);g.rotate(Math.atan2(({D:-1,I:1,S:1,C:-1}[second])-({D:-1,I:1,S:1,C:-1}[first]),({D:1,I:1,S:-1,C:-1}[second])-({D:1,I:1,S:-1,C:-1}[first])));g.globalAlpha=.22;g.fillStyle=COL[first];g.beginPath();g.ellipse(0,0,r*1.35,r*.72,0,0,Math.PI*2);g.fill();g.restore();g.globalAlpha=1;g.strokeStyle=COL[second];g.lineWidth=4;g.beginPath();g.arc(px,py,18,-Math.PI/2,Math.PI/2);g.stroke();g.strokeStyle=COL[first];g.beginPath();g.arc(px,py,18,Math.PI/2,Math.PI*1.5);g.stroke();g.fillStyle='#fff';g.beginPath();g.arc(px,py,6,0,Math.PI*2);g.fill()}
if(answers.length===Q.length&&answers.every(a=>a&&a.length===4)){start.querySelector('.primary').textContent='저장된 결과 이어보기';$('#startBtn').onclick=()=>{start.classList.add('hidden');showResult()}}
