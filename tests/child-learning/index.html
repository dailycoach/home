<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>DAILYCOACHING | 나의 배움 강점 찾기</title>
  <style>
    :root {
      --bg: #fff9ea;
      --surface: #ffffff;
      --surface-soft: #fff9e9;
      --text: #3d2d08;
      --muted: #7a6a3d;
      --line: #f1e6bf;
      --primary: #d89b00;
      --primary-soft: #fff2c4;
      --accent: #f0bd2f;
      --danger: #cf4f6c;
      --success: #2f8f6a;
      --agree: #3ca370;
      --agree-soft: #e7f6ee;
      --neutral: #9ca1af;
      --disagree: #b58a1a;
      --disagree-soft: #fbf1cf;
      --shadow: 0 18px 45px rgba(122, 106, 61, 0.12);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: linear-gradient(180deg, #fff9e7 0%, #fff6d9 100%);
      color: var(--text);
      font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    body {
      min-height: 100vh;
    }

    .shell {
      max-width: 980px;
      margin: 0 auto;
      padding: 24px 16px 88px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
      padding: 10px 0 14px;
      backdrop-filter: blur(10px);
      background: linear-gradient(180deg, rgba(255,251,233,0.96) 0%, rgba(255,251,233,0.84) 100%);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 2px;
      line-height: 1.1;
    }

    .brand-main {
      font-weight: 900;
      letter-spacing: -0.02em;
      font-size: 1rem;
    }

    .brand-sub {
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 600;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(216, 155, 0, 0.08);
      color: var(--primary);
      font-size: 0.9rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .card {
      background: var(--surface);
      border: 1px solid rgba(216, 155, 0, 0.08);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .hero {
      padding: 28px;
      display: grid;
      gap: 22px;
    }

    .hero h1, .page-title h2, .section-title h3 {
      margin: 0;
      letter-spacing: -0.03em;
    }

    .hero h1 {
      font-size: clamp(1.75rem, 3vw, 2.6rem);
      line-height: 1.15;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .intro-kicker {
      display: inline-block;
      margin: 10px 0 0;
      color: var(--primary);
      font-size: 0.92rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .mini-panel {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      padding: 16px;
    }

    .mini-panel strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.98rem;
    }

    .mini-panel span {
      color: var(--muted);
      font-size: 0.94rem;
    }

    .scale-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .scale-item {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 12px;
      text-align: center;
    }

    .scale-item b {
      display: block;
      font-size: 1rem;
      color: var(--primary);
      margin-bottom: 4px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .btn {
      min-height: 48px;
      border-radius: 999px;
      padding: 0 18px;
      font-weight: 700;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: #fff;
      box-shadow: 0 14px 30px rgba(216, 155, 0, 0.28);
    }

    .btn-secondary {
      background: #fff;
      color: var(--text);
      border: 1px solid var(--line);
    }

    .btn-danger {
      background: #fff3f5;
      color: var(--danger);
      border: 1px solid #ffd4de;
    }

    .progress-wrap {
      padding: 18px 20px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 10px;
    }

    .progress-bar {
      height: 12px;
      background: #f4e8c1;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-value {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: inherit;
      transition: width 0.2s ease;
    }

    .page {
      padding: 20px;
    }

    .page-title {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .page-title h2 {
      font-size: clamp(1.3rem, 2vw, 1.8rem);
    }

    .page-title p {
      margin: 4px 0 0;
      color: var(--muted);
    }

    .question-list {
      display: grid;
      gap: 14px;
    }

    .question-card {
      border: 1px solid #efe2b8;
      border-radius: 26px;
      padding: 20px;
      background: linear-gradient(180deg, #ffffff 0%, #fffef8 100%);
      scroll-margin-top: 120px;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }

    .question-card.is-complete {
      border-color: rgba(60, 163, 112, 0.32);
      box-shadow: 0 10px 22px rgba(60, 163, 112, 0.08);
    }

    .question-card.active-focus {
      border-color: rgba(216, 155, 0, 0.34);
      box-shadow: 0 0 0 4px rgba(216, 155, 0, 0.08), 0 12px 28px rgba(216, 155, 0, 0.10);
      transform: translateY(-1px);
    }

    .question-head {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }

    .question-head-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .question-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      color: var(--primary);
      font-weight: 800;
      font-size: 0.98rem;
      transition: all 0.18s ease;
    }

    .question-card.is-complete .question-number {
      background: #eaf7f0;
      color: var(--success);
      border-color: rgba(47, 143, 106, 0.22);
    }

    .completion-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: #fff8dd;
      border: 1px solid #f1e6bf;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
    }

    .completion-badge.done {
      background: #eef8f3;
      border-color: #cfe9db;
      color: var(--success);
    }

    .question-card h4 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.024em;
      line-height: 1.5;
    }

    .likert-wrap {
      display: grid;
      gap: 12px;
      padding: 14px;
      border-radius: 20px;
      background: #fffbee;
      border: 1px solid #f6ecc8;
    }

    .choice-row {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 14px;
    }

    .mobile-poles {
      display: none;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.9rem;
      font-weight: 800;
    }

    .mobile-poles .agree { color: var(--agree); }
    .mobile-poles .disagree { color: var(--disagree); }

    .likert-side {
      font-size: 0.95rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .likert-side.agree {
      color: var(--agree);
    }

    .likert-side.disagree {
      color: var(--disagree);
      text-align: right;
    }

    .choice-scale {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .choice-btn {
      appearance: none;
      border: 0;
      background: transparent;
      padding: 0;
      width: 56px;
      height: 56px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      position: relative;
      transition: transform 0.15s ease, filter 0.15s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .choice-btn:hover {
      transform: translateY(-1px) scale(1.02);
    }

    .choice-btn:focus-visible {
      outline: 3px solid rgba(216, 155, 0, 0.18);
      outline-offset: 3px;
    }

    .choice-btn::before {
      content: '';
      width: 100%;
      height: 100%;
      border-radius: 999px;
      border: 3px solid currentColor;
      background: #fff;
      box-sizing: border-box;
      transition: background 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .choice-btn::after {
      content: '✓';
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      font-size: 1rem;
      color: transparent;
      transition: color 0.15s ease, transform 0.15s ease;
      transform: scale(0.8);
    }

    .choice-btn.score-5,
    .choice-btn.score-4 {
      color: var(--agree);
    }

    .choice-btn.score-3 {
      color: var(--neutral);
    }

    .choice-btn.score-2,
    .choice-btn.score-1 {
      color: var(--disagree);
    }

    .choice-btn.score-5,
    .choice-btn.score-1 {
      width: 60px;
      height: 60px;
    }

    .choice-btn.score-4,
    .choice-btn.score-2 {
      width: 52px;
      height: 52px;
    }

    .choice-btn.score-3 {
      width: 42px;
      height: 42px;
    }

    .choice-btn.active.score-5::before,
    .choice-btn.active.score-4::before {
      background: var(--agree-soft);
      box-shadow: inset 0 0 0 10px currentColor, 0 8px 18px rgba(60, 163, 112, 0.18);
    }

    .choice-btn.active.score-3::before {
      background: #eff1f5;
      box-shadow: inset 0 0 0 7px currentColor, 0 8px 18px rgba(156, 161, 175, 0.18);
    }

    .choice-btn.active.score-2::before,
    .choice-btn.active.score-1::before {
      background: var(--disagree-soft);
      box-shadow: inset 0 0 0 10px currentColor, 0 8px 18px rgba(181, 138, 26, 0.18);
    }

    .choice-btn.active {
      transform: scale(1.05);
    }

    .choice-btn.active::after {
      color: #fff;
      transform: scale(1);
    }

    .choice-hint {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      color: #7a6a3d;
      font-size: 0.84rem;
      padding: 0 88px;
      font-weight: 700;
    }

    .choice-hint span {
      flex: 1;
      text-align: center;
      line-height: 1.25;
    }

    .footer-nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 22px;
      flex-wrap: wrap;
    }

    .footer-nav .group {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat-box {
      background: var(--surface-soft);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .stat-box small {
      color: var(--muted);
      display: block;
      margin-bottom: 8px;
    }

    .stat-box strong {
      font-size: 1.4rem;
      display: block;
      letter-spacing: -0.03em;
    }

    .result-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 18px;
      align-items: start;
    }

    .section-card {
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 18px;
    }

    .section-title {
      margin-bottom: 14px;
    }

    .section-title h3 {
      font-size: 1.1rem;
    }

    .section-title p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.94rem;
    }

    .score-list {
      display: grid;
      gap: 10px;
    }

    .score-item {
      display: grid;
      grid-template-columns: minmax(0, 120px) minmax(0, 1fr) auto;
      gap: 10px;
      align-items: center;
    }

    .score-item .label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .bar {
      width: 100%;
      height: 12px;
      background: #f7edca;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar > span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #e1a800, #f4cf66);
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--surface-soft);
      border: 1px solid var(--line);
      font-size: 0.93rem;
      font-weight: 700;
    }

    .tag.good { color: var(--success); }
    .tag.bad { color: var(--danger); }

    textarea {
      width: 100%;
      min-height: 92px;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px;
      font: inherit;
      color: var(--text);
      background: #fff;
      resize: vertical;
    }

    .note-grid {
      display: grid;
      gap: 12px;
    }

    .note-item {
      background: #ffffff;
      border: 1px solid #f4e8c2;
      border-radius: 18px;
      padding: 14px;
    }

    .note-item strong {
      display: block;
      margin-bottom: 8px;
    }

    .low-item-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .result-hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .metric-hero {
      border-radius: 24px;
      padding: 22px;
      background: linear-gradient(135deg, #d89b00 0%, #f2c23c 100%);
      color: #fff;
      box-shadow: 0 20px 40px rgba(216, 155, 0, 0.22);
    }

    .metric-hero small {
      display: block;
      opacity: 0.82;
      margin-bottom: 8px;
    }

    .metric-hero strong {
      display: block;
      font-size: clamp(2rem, 5vw, 3rem);
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
    }

    .metric-hero .sub {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .metric-hero .sub span {
      background: rgba(255,255,255,0.14);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      padding: 8px 12px;
      font-weight: 700;
      font-size: 0.92rem;
    }

    .summary-card {
      background: #fff;
      border: 1px solid #f3e7be;
      border-radius: 24px;
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .summary-block {
      padding: 12px 14px;
      border-radius: 18px;
      background: #fffbee;
      border: 1px solid #f6ecc8;
    }

    .summary-block strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.95rem;
    }

    .revisit-stack {
      display: grid;
      gap: 14px;
      margin-top: 6px;
    }

    .revisit-card {
      padding: 16px;
      border-radius: 20px;
      border: 1px solid #f4e8c2;
      background: #fffef8;
    }

    .revisit-card h4 {
      margin: 0 0 6px;
      font-size: 1rem;
      letter-spacing: -0.02em;
    }

    .low-item {
      border-radius: 16px;
      background: #fff8fa;
      border: 1px solid #ffd9e1;
      padding: 12px 14px;
      font-size: 0.94rem;
    }

    .low-item b {
      color: var(--danger);
    }

    .prompt-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .prompt-item {
      border-radius: 14px;
      background: #fff9e9;
      border: 1px solid #eadca8;
      padding: 12px 14px;
      font-size: 0.94rem;
      color: var(--text);
    }

    .prompt-item b {
      color: var(--primary);
    }

    .empty-state {
      padding: 18px;
      border-radius: 18px;
      background: #fffdf4;
      border: 1px dashed #e5d17c;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .helper {
      color: var(--muted);
      font-size: 0.92rem;
    }

    .hidden {
      display: none !important;
    }

    .center {
      text-align: center;
    }

    .print-only {
      display: none;
    }

    .svg-wrap {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 22px;
      background: linear-gradient(180deg, #fffbee 0%, #fffdf3 100%);
      border: 1px solid var(--line);
      padding: 10px;
    }

    .svg-wrap svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    @media (max-width: 820px) {
      .hero-grid,
      .result-grid,
      .stats-grid,
      .result-hero {
        grid-template-columns: 1fr;
      }

      .score-item {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .shell {
        padding-left: 12px;
        padding-right: 12px;
      }

      .hero,
      .page,
      .progress-wrap {
        padding-left: 16px;
        padding-right: 16px;
      }

      .scale-grid {
        grid-template-columns: 1fr;
      }

      .question-card {
        padding: 16px 14px;
        scroll-margin-top: 88px;
      }

      .choice-row {
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .mobile-poles {
        display: flex;
      }

      .likert-side {
        display: none;
      }

      .choice-scale {
        gap: 8px;
      }

      .choice-btn.score-5,
      .choice-btn.score-1 {
        width: 52px;
        height: 52px;
      }

      .choice-btn.score-4,
      .choice-btn.score-2 {
        width: 46px;
        height: 46px;
      }

      .choice-btn.score-3 {
        width: 38px;
        height: 38px;
      }

      .choice-hint {
        padding: 0;
        font-size: 0.75rem;
        gap: 4px;
      }

      .metric-hero,
      .summary-card {
        padding: 18px;
      }

      .choice-hint span:nth-child(2),
      .choice-hint span:nth-child(4) {
        font-size: 0.72rem;
      }

      .footer-nav {
        flex-direction: column;
      }

      .footer-nav .group,
      .footer-nav .btn,
      .actions .btn {
        width: 100%;
      }
    }

    @media print {
      body {
        background: #fff;
      }

      .topbar,
      .footer-nav,
      .actions,
      .helper,
      .no-print {
        display: none !important;
      }

      .shell {
        max-width: 100%;
        padding: 0;
      }

      .card,
      .section-card,
      .question-card,
      .stat-box {
        box-shadow: none;
      }

      .print-only {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="brand"><div class="brand-main">DAILYCOACHING</div><div class="brand-sub">나의 배움 강점 찾기</div></div>
      <div class="chip" id="autosave-status">자동 저장 켜짐</div>
    </div>

    <div class="card">
      <div id="app"></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'dailycoaching-multiple-intelligences-elementary-v1';

    const SCALE_LABELS = {
      5: '정말 그렇다',
      4: '그런 편이다',
      3: '보통이다',
      2: '아닌 편이다',
      1: '전혀 아니다'
    };

    const CATEGORIES = [
      {
            "id": 1,
            "name": "언어지능",
            "description": "말하고, 읽고, 쓰면서 배우는 힘",
            "items": [

    function defaultState() {
      return {
        screen: 'intro',
        sectionIndex: 0,

          top2: '',
          top3: '',
          low1: '',

          improvement: ''

      };
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
        return saved ? { ...defaultState(), ...saved, notes: { ...defaultState().notes, ...(saved.notes || {}) } } : defaultState();
      } catch (error) {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      autosaveStatus.textContent = '자동 저장 완료';
      clearTimeout(saveState._t);
      saveState._t = setTimeout(() => {
        autosaveStatus.textContent = '자동 저장 켜짐';
      }, 1200);
    }

    function setState(patch) {
      Object.assign(state, patch);
      saveState();
      render();
    }

    function totalQuestionCount() {
      return CATEGORIES.reduce((sum, category) => sum + category.items.length, 0);
    }

    function answeredCount() {
      return Object.keys(state.answers).length;
    }

    function getQuestionKey(categoryId, itemIndex) {
      return `${categoryId}-${itemIndex}`;
    }

    function getScoreToneLabel(score) {
      return ({
        5: '정말 그렇다',
        4: '그런 편이다',
        3: '보통이다',
        2: '아닌 편이다',
        1: '전혀 아니다'
      })[score] || '';
    }

    function updateAnswer(categoryId, itemIndex, value) {
      state.answers[getQuestionKey(categoryId, itemIndex)] = value;
      saveState();
      render();
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          scrollToNextQuestion(categoryId, itemIndex);
        });
      });
    }

    function clearAll() {
      if (!window.confirm('응답과 메모를 모두 지울까요?')) return;
      localStorage.removeItem(STORAGE_KEY);
      Object.assign(state, defaultState());
      render();
    }

    function startTest() {
      setState({ screen: 'test', sectionIndex: 0 });
    }

    function goSection(direction) {
      const nextIndex = state.sectionIndex + direction;
      if (nextIndex < 0 || nextIndex >= CATEGORIES.length) return;
      setState({ sectionIndex: nextIndex });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function scrollToNextQuestion(categoryId, itemIndex) {
      if (state.screen !== 'test') return;
      const nextQuestion = document.querySelector(`[data-question-card="${categoryId}-${itemIndex + 1}"]`);
      const fallbackTarget = document.getElementById('next-btn') || document.getElementById('finish-btn');
      const target = nextQuestion || fallbackTarget;
      if (!target) return;

      document.querySelectorAll('.question-card.active-focus').forEach(card => card.classList.remove('active-focus'));
      if (nextQuestion) nextQuestion.classList.add('active-focus');

      const rect = target.getBoundingClientRect();
      const currentScroll = window.pageYOffset || document.documentElement.scrollTop || 0;
      const desiredOffset = window.innerWidth <= 768
        ? Math.max(110, window.innerHeight * 0.28)
        : 132;
      const targetTop = rect.top + currentScroll - desiredOffset;
      window.scrollTo({ top: Math.max(0, targetTop), behavior: 'smooth' });
    }

    function finishTest() {
      if (answeredCount() < totalQuestionCount()) {
        const ok = window.confirm('아직 답하지 않은 문항이 있습니다. 결과 화면으로 이동할까요?');
        if (!ok) return;
      }
      setState({ screen: 'result' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToIntro() {
      setState({ screen: 'intro' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function backToTest() {
      setState({ screen: 'test' });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

        return;
      }

    }

    function calculateResults() {
      const categories = CATEGORIES.map(category => {
        const itemDetails = category.items.map((text, index) => {
          const score = Number(state.answers[getQuestionKey(category.id, index)] || 0);
          return { index: index + 1, text, score };
        });
        const score = itemDetails.reduce((sum, item) => sum + item.score, 0);
        const lowItems = itemDetails.filter(item => item.score > 0 && item.score <= 2);
        const answeredItems = itemDetails.filter(item => item.score > 0);
        const lowestAnsweredScore = answeredItems.length
          ? Math.min(...answeredItems.map(item => item.score))
          : 0;
        const revisitItems = lowItems.length
          ? lowItems
          : answeredItems.filter(item => item.score === lowestAnsweredScore);
        const revisitMode = lowItems.length
          ? 'low-score'
          : answeredItems.length
            ? 'relative-low-score'
            : 'no-answer';

        return {
          id: category.id,
          name: category.name,
          description: category.description,
          score,
          average: Number((score / category.items.length).toFixed(2)),
          itemDetails,
          lowItems,
          lowestAnsweredScore,
          revisitItems,
          revisitMode
        };
      });

      const sortedDesc = [...categories].sort((a, b) => b.score - a.score || a.id - b.id);
      const sortedAsc = [...categories].sort((a, b) => a.score - b.score || a.id - b.id);
      const total = categories.reduce((sum, category) => sum + category.score, 0);
      return {
        categories,
        sortedDesc,
        sortedAsc,
        top3: sortedDesc.slice(0, 3),
        low3: sortedAsc.slice(0, 3),
        total,
        average: Number((total / totalQuestionCount()).toFixed(2))
      };
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function renderPromptList(categoryId) {
      const prompts = IMPROVEMENT_PROMPTS[categoryId] || [];
      if (!prompts.length) return '';
      return `
        <div class="prompt-list">
          ${prompts.map((prompt, index) => `
            <div class="prompt-item"><b>권장 개선 질문 ${index + 1}</b><br>${prompt}</div>
          `).join('')}
        </div>
      `;
    }

    function renderRadar(categories) {
      const size = 520;
      const center = size / 2;
      const radius = 175;
      const steps = 8;
      const maxScore = 40;

      const labels = categories.map(category => category.name);
      const points = categories.map((category, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / categories.length);
        const valueRadius = radius * (category.score / maxScore);
        return {
          x: center + Math.cos(angle) * valueRadius,
          y: center + Math.sin(angle) * valueRadius,
          angle,
          labelX: center + Math.cos(angle) * (radius + 32),
          labelY: center + Math.sin(angle) * (radius + 32),
          label: labels[index]
        };
      });

      const polygonPoints = points.map(point => `${point.x},${point.y}`).join(' ');

      const rings = Array.from({ length: steps }, (_, index) => {
        const ringRadius = radius * ((index + 1) / steps);
        const ringPoints = categories.map((_, itemIndex) => {
          const angle = (-Math.PI / 2) + (Math.PI * 2 * itemIndex / categories.length);
          return `${center + Math.cos(angle) * ringRadius},${center + Math.sin(angle) * ringRadius}`;
        }).join(' ');
        return `<polygon points="${ringPoints}" fill="none" stroke="#eadca8" stroke-width="1"></polygon>`;
      }).join('');

      const axes = categories.map((_, index) => {
        const angle = (-Math.PI / 2) + (Math.PI * 2 * index / categories.length);
        return `<line x1="${center}" y1="${center}" x2="${center + Math.cos(angle) * radius}" y2="${center + Math.sin(angle) * radius}" stroke="#eadca8" stroke-width="1"></line>`;
      }).join('');

      const labelsSvg = points.map(point => `
        <text x="${point.labelX}" y="${point.labelY}" font-size="15" font-weight="700" fill="#7a6a3d" text-anchor="middle" dominant-baseline="middle">${escapeHtml(point.label)}</text>
      `).join('');

      const ticks = Array.from({ length: steps }, (_, index) => {
        const value = (maxScore / steps) * (index + 1);
        const y = center - (radius * ((index + 1) / steps));
        return `<text x="${center + 6}" y="${y - 4}" font-size="11" fill="#9a8a5c">${value}</text>`;
      }).join('');

      return `
        <svg viewBox="0 0 ${size} ${size}" role="img" aria-label="영역별 점수 레이더 차트">
          ${rings}
          ${axes}
          <polygon points="${polygonPoints}" fill="rgba(216, 155, 0, 0.16)" stroke="#d89b00" stroke-width="3"></polygon>
          ${points.map(point => `<circle cx="${point.x}" cy="${point.y}" r="4" fill="#d89b00"></circle>`).join('')}
          ${labelsSvg}
          ${ticks}
        </svg>
      `;
    }

    function updateNote(field, value) {
      state.notes[field] = value;
      saveState();
    }

    function renderReasonInputs(title, targets, fieldPrefix) {
      return `
        <div class="section-card">
          <div class="section-title">
            <h3>${title}</h3>
            <p>점수가 높게 나온 이유와 조금 덜 편한 이유를 짧게 적어보세요.</p>
          </div>
          <div class="note-grid">
            ${targets.map((target, index) => `
              <div class="note-item">
                <strong>(${index + 1}) ${target.name} · ${target.score}점</strong>
                <textarea data-note="${fieldPrefix}${index + 1}" placeholder="왜 이렇게 나왔는지 짧게 적어보세요.">${escapeHtml(state.notes[`${fieldPrefix}${index + 1}`] || '')}</textarea>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function renderResult() {
      const result = calculateResults();
      const completion = Math.round((answeredCount() / totalQuestionCount()) * 100);

      app.innerHTML = `
        <section class="page">
          <div class="page-title">
            <div>
              <h2>내 결과 보기</h2>
              <p>영역별 점수와 나의 강점, 그리고 조금 덜 자주 쓰는 방식을 볼 수 있어요.</p>
            </div>
            <div class="chip">응답률 ${completion}%</div>
          </div>

          <div class="result-hero">
            <div class="metric-hero">
              <small>전체 결과 한눈에 보기</small>
              <strong>${result.total}점</strong>
              <div class="sub">
                <span>문항 평균 ${result.average}점</span>
                <span>응답 ${answeredCount()} / ${totalQuestionCount()}</span>
                <span>완료율 ${completion}%</span>
              </div>
            </div>
            <div class="summary-card">
              <div class="summary-block">
                <strong>내가 잘 살아나는 배움 방식 TOP 3</strong>
                <div class="tag-list">
                  ${result.top3.map(item => `<div class="tag good">${item.name} · ${item.score}점</div>`).join('')}
                </div>
              </div>
              <div class="summary-block">
                <strong>아직 덜 자주 쓰는 방식 TOP 3</strong>
                <div class="tag-list">
                  ${result.low3.map(item => `<div class="tag bad">${item.name} · ${item.score}점</div>`).join('')}
                </div>
              </div>
            </div>
          </div>

          <div class="result-grid">
            <div class="section-card">
              <div class="section-title">
                <h3>영역별 점수</h3>
                <p>각 영역은 최대 40점이에요.</p>
              </div>
              <div class="score-list">
                ${result.categories.map(category => `
                  <div class="score-item">
                    <div class="label">(${category.id}) ${category.name}</div>
                    <div class="bar"><span style="width:${(category.score / 40) * 100}%"></span></div>
                    <div><strong>${category.score}</strong> / 40</div>
                  </div>
                `).join('')}
              </div>
            </div>

            <div class="section-card">
              <div class="section-title">
                <h3>한눈에 보기</h3>
                <p>어떤 배움 방식이 더 높게 나왔는지 그림으로 볼 수 있어요.</p>
              </div>
              <div class="svg-wrap">${renderRadar(result.categories)}</div>
            </div>
          </div>

          <div class="result-grid" style="margin-top:18px;">
            ${renderReasonInputs('내가 잘 살아나는 방식과 그 이유', result.top3, 'top')}
            ${renderReasonInputs('아직 덜 자주 쓰는 방식과 그 이유', result.low3, 'low')}
          </div>

          <div class="section-card" style="margin-top:18px;">
            <div class="section-title">
              <h3>조금 더 살펴보기</h3>
              <p>점수가 낮게 나온 영역도 못하는 것이 아니에요. 지금은 조금 덜 편하거나 덜 자주 쓰는 방식일 수 있어요.</p>
            </div>
            <div class="revisit-stack">
              ${result.low3.map(category => `
                <div class="revisit-card">
                  <h4>${category.name}</h4>
                  ${category.revisitMode === 'low-score'
                    ? `<div class="helper" style="margin-bottom:10px;">이 영역에서 낮게 응답한 문항이에요.</div>`
                    : category.revisitMode === 'relative-low-score'
                      ? `<div class="helper" style="margin-bottom:10px;">1점이나 2점은 없어서, 이 영역에서 가장 낮게 응답한 ${category.lowestAnsweredScore}점 문항을 보여드려요.</div>`
                      : '<div class="empty-state">아직 이 영역에는 답한 문항이 없어요.</div>'}
                  ${category.revisitMode !== 'no-answer'
                    ? `<div class="low-item-list">${category.revisitItems.map(item => `
                        <div class="low-item"><b>${item.score}점</b> · ${item.index}. ${item.text}</div>
                      `).join('')}</div>`
                    : ''}
                  ${renderPromptList(category.id)}
                </div>
              `).join('')}
            </div>

            <div class="note-item" style="margin-top:14px;">
              <strong>이번 주에 해볼 한 가지</strong>
              <textarea id="improvement-note" placeholder="내 강점을 더 써볼 방법이나 해볼 행동을 적어보세요.">${escapeHtml(state.notes.improvement || '')}</textarea>
            </div>
          </div>

          <div class="footer-nav no-print">
            <div class="group">
              <button class="btn btn-secondary" id="back-test-btn">응답 화면으로</button>
              <button class="btn btn-secondary" id="back-home-btn">처음으로</button>
            </div>
            <div class="group">
              <button class="btn btn-secondary" id="print-btn">결과 저장/인쇄</button>
              <button class="btn btn-danger" id="reset-result-btn">기록 초기화</button>
            </div>
          </div>

          <div class="print-only helper center" style="margin-top:16px;">나의 배움 강점 찾기 결과 요약</div>
        </section>
      `;

      document.querySelectorAll('[data-note]').forEach(textarea => {
        textarea.addEventListener('input', event => updateNote(textarea.dataset.note, event.target.value));
      });
      document.getElementById('improvement-note').addEventListener('input', event => updateNote('improvement', event.target.value));
      document.getElementById('back-test-btn').onclick = backToTest;
      document.getElementById('back-home-btn').onclick = backToIntro;
      document.getElementById('print-btn').onclick = () => window.print();
      document.getElementById('reset-result-btn').onclick = clearAll;
    }
  </script>
</body>
</html>
