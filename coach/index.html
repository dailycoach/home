<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>코치소개 | DAILYCOACHING</title>
  <style>
    :root {
      --bg: #f5f7f6;
      --ink: #14212b;
      --muted: rgba(20, 33, 43, .68);
      --line: rgba(20, 33, 43, .12);
      --brand: #457b70;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 82% 12%, rgba(69, 123, 112, .20), transparent 30%),
        linear-gradient(140deg, #fbfbf6 0%, var(--bg) 52%, #eef4fb 100%);
    }
    main {
      width: min(100% - 36px, 860px);
      margin: 0 auto;
      padding: 72px 0;
    }
    .eyebrow {
      margin: 0 0 14px;
      color: var(--brand);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .14em;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.3rem, 8vw, 5rem);
      line-height: 1.05;
      letter-spacing: -.02em;
    }
    p {
      max-width: 620px;
      margin: 24px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.8;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 34px;
    }
    a {
      display: inline-flex;
      min-height: 46px;
      align-items: center;
      justify-content: center;
      padding: 0 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: inherit;
      text-decoration: none;
      font-weight: 800;
      background: rgba(255, 255, 255, .56);
    }
    a.primary {
      border-color: transparent;
      background: var(--ink);
      color: #fff;
    }
  </style>
</head>
<body>
  <main>
    <p class="eyebrow">DAILYCOACHING</p>
    <h1>코치소개</h1>
    <p>코치 프로필, 코칭 관점, 진행 방식과 주요 이력을 담는 소개 페이지입니다. 현재는 메인 사이트 통합을 위해 경로를 먼저 열어두었습니다.</p>
    <div class="actions">
      <a class="primary" href="../">첫 화면으로</a>
      <a href="https://smartstore.naver.com/nalbitcoaching">코칭 신청</a>
    </div>
  </main>
</body>
</html>
