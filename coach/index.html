<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />

  <meta name="theme-color" content="#061528" />

  <link
    rel="preload"
    as="image"

    fetchpriority="high"
  />

  <meta property="og:type" content="website" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://ddaycoach.wordpress.com/wp-content/uploads/2026/06/chatgpt-image-2026eb8584-6ec9b94-18ec9dbc-ec98a4ed9b84-03_00_21.png" />

  <style>
    :root {
      --navy-980: #031022;
      --navy-950: #061528;
      --ink: #111827;
      --ivory: #fffaf2;
      --gold: #c49a57;
      --header-h: 76px;
      --max: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--ivory);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
      letter-spacing: -0.035em;
    }
    a { color: inherit; text-decoration: none; }
    button, a { -webkit-tap-highlight-color: transparent; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 40;
      height: var(--header-h);
      border-bottom: 1px solid rgba(255,255,255,.12);
      background: rgba(3, 16, 34, .76);
      backdrop-filter: blur(18px);
      color: #fff;
    }
    .header-inner {
      width: min(var(--max), calc(100% - 40px));
      height: 100%;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(1rem, 1.5vw, 1.38rem);
      font-weight: 700;
      letter-spacing: .18em;
      white-space: nowrap;
    }
    .brand::before {
      content: "";
      width: 32px;
      height: 1px;
      background: var(--gold);
      opacity: .9;
    }
    .nav {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: .95rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }
    .nav a {
      min-height: 42px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      color: rgba(255,255,255,.82);
      white-space: nowrap;
    }
    .nav a:hover { background: rgba(255,255,255,.10); color: #fff; }
    .nav .cta {
      margin-left: 8px;
      color: var(--navy-980);
      background: linear-gradient(135deg, #efd38e, #c49148);
      border: 1px solid rgba(255,255,255,.22);
      box-shadow: 0 16px 34px rgba(3, 16, 34, .24);
    }

    .coach-page {
      min-height: calc(100vh - var(--header-h));
      background: var(--ivory);
      overflow: visible;
    }

    .coach-responsive-section {
      width: 100%;
      margin: 0;
      padding: 0;
      background: var(--ivory);
    }

    .coach-image {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      object-position: top center;
      filter: saturate(.98) contrast(1.02);
    }

    .floating-actions {
      position: fixed;
      right: 22px;
      bottom: 22px;
      z-index: 45;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .floating-actions a {
      min-height: 42px;
      padding: 0 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      color: #fff;
      background: rgba(3, 16, 34, .78);
      border: 1px solid rgba(255,255,255,.22);
      backdrop-filter: blur(16px);
      font-size: .86rem;
      font-weight: 800;
      letter-spacing: -.02em;
      box-shadow: 0 18px 38px rgba(3,16,34,.22);
    }
    .floating-actions a:hover { background: rgba(3, 16, 34, .92); }

    .footer {
      background: var(--navy-950);
      color: #fff;
      padding: 46px 0;
    }
    .footer-inner {
      width: min(var(--max), calc(100% - 40px));
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 20px;
      color: rgba(255,255,255,.72);
      font-size: .92rem;
      font-weight: 700;
    }
    .footer strong {
      display: block;
      color: #fff;
      font-family: Georgia, "Times New Roman", serif;
      letter-spacing: .2em;
      margin-bottom: 8px;
    }
    .footer-links { display:flex; gap: 18px; flex-wrap:wrap; justify-content:flex-end; }
    .footer-links a { color: rgba(255,255,255,.76); }
    .footer-links a:hover { color: #fff; }

    @media (max-width: 920px) {
      .nav { display: none; }
      .footer-inner { flex-direction: column; align-items: flex-start; }
      .footer-links { justify-content: flex-start; }
    }

    @media (max-width: 540px) {
      :root { --header-h: 66px; }
      .header-inner { width: calc(100% - 28px); }
      .brand { font-size: .92rem; letter-spacing: .14em; }
      .brand::before { width: 22px; }
      .floating-actions {
        right: 14px;
        bottom: 14px;
      }
      .floating-actions a {
        min-height: 38px;
        padding: 0 12px;
        font-size: .78rem;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="데일리코칭 홈으로 이동">DAILYCOACHING</a>
      <nav class="nav" aria-label="코치소개 페이지 메뉴">
        <a href="/company/">기업소개</a>
        <a href="/coach/" aria-current="page">코치소개</a>
        <a href="/tests/self/">검사도구</a>
        <a href="/cards/kingdom/">카드도구</a>
        <a href="/lcms/">LCMS</a>
        <a class="cta" href="https://smartstore.naver.com/nalbitcoaching" target="_blank" rel="noopener noreferrer">코칭 신청</a>
      </nav>
    </div>
  </header>

  <main class="coach-page">
    <!-- IMAGE SLOT coachIntro: 단일 대표 이미지 -->
    <section class="coach-responsive-section" aria-label="데일리코칭 코치소개 이미지">
      <img
        class="coach-image"
        src="https://ddaycoach.wordpress.com/wp-content/uploads/2026/06/chatgpt-image-2026eb8584-6ec9b94-18ec9dbc-ec98a4ed9b84-03_00_21.png"
        alt="데일리코칭 코치소개 이미지"
        fetchpriority="high"
        decoding="async"
      />
    </section>
  </main>

  <div class="floating-actions" aria-label="빠른 이동">
    <a href="/">홈</a>
    <a href="https://smartstore.naver.com/nalbitcoaching" target="_blank" rel="noopener noreferrer">코칭 신청</a>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <div>
        <strong>DAILYCOACHING</strong>
        <span>© <span id="year">2026</span> DAILYCOACHING. All rights reserved.</span>
      </div>
      <div class="footer-links">
        <a href="/">홈</a>
        <a href="/company/">기업소개</a>
        <a href="https://smartstore.naver.com/nalbitcoaching" target="_blank" rel="noopener noreferrer">스마트스토어 날빛코칭</a>
      </div>
    </div>
  </footer>

  <script>
    const DAILYCOACHING_IMAGES = Object.freeze({
      coachIntro: 'https://ddaycoach.wordpress.com/wp-content/uploads/2026/06/chatgpt-image-2026eb8584-6ec9b94-18ec9dbc-ec98a4ed9b84-03_00_21.png'
    });
    const DAILYCOACHING_ROUTES = Object.freeze({
      home: '/',
      companyIntro: '/company/',
      coachIntro: '/coach/',
      booking: 'https://smartstore.naver.com/nalbitcoaching',
      lcms: '/lcms/',
      kingdomCard: '/cards/kingdom/',
      talkcard180: '/cards/talkcard180/',
      selfTest: '/tests/self/'
    });
    const year = document.querySelector('#year');
    if (year) year.textContent = new Date().getFullYear();
    window.DAILYCOACHING_IMAGES = DAILYCOACHING_IMAGES;
    window.DAILYCOACHING_ROUTES = DAILYCOACHING_ROUTES;
  </script>
</body>
</html>
